    color: var(--stone-lt);
    letter-spacing: 0.06em;
  }

  .tally-body {
    padding: 0.875rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .tally-track {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .tally-track-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .tally-grades {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.75rem;
  }

  .tally-grade {
    display: flex;
    align-items: baseline;
    gap: 0.35rem;
  }

  .tg-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    white-space: nowrap;
  }

  .tg-marks {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .tg-marks.sea-a { color: var(--sea-a); }
  .tg-marks.sea-b { color: var(--sea-b); }
  .tg-marks.sea-c { color: var(--sea-c); }
  .tg-marks.riv-lo  { color: var(--riv-lo); }
  .tg-marks.riv-mid { color: var(--riv-mid); }
  .tg-marks.riv-hi  { color: var(--riv-hi); }
  .tg-marks.p1 { color: var(--p1); }
  .tg-marks.p2 { color: var(--p2); }
  .tg-marks.p3 { color: var(--p3); }
  .tg-marks.loch { color: var(--loch); }
  .tg-marks.none { color: var(--stone-lt); }

  .tally-divider {
    height: 1px;
    background: var(--border);
  }

  .tally-stat-row {
    display: flex;
    gap: 1.5rem;
  }

  .tally-stat {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }

  .tally-stat-value {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1;
  }

  .tally-stat-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone);
  }

  /* Past trip list */
  .past-section-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
    padding: 0.75rem 0.875rem 0.3rem;
  }

  .past-trip-card {
    background: var(--white);
    border-radius: 6px;
    border: 1px solid var(--border);
    margin: 0 0.875rem 0.4rem;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    cursor: pointer;
    min-height: 64px;
  }

  .past-accent { width: 4px; flex-shrink: 0; }

  .past-thumb {
    width: 68px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .past-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.7) brightness(0.92);
  }

  .past-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }

  .past-body {
    flex: 1;
    padding: 0.55rem 0.75rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.15rem;
    min-width: 0;
  }

  .past-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--peat);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .past-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--peat);
    font-style: italic;
  }

  .past-bottom {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.1rem;
  }

  .past-grade-tag {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.08rem 0.3rem;
    border-radius: 2px;
    white-space: nowrap;
  }

  .past-emoji {
    font-size: 1.05rem;
    flex-shrink: 0;
    margin-left: auto;
    padding-right: 0.5rem;
  }

  /* ── CANCEL BUTTON & SHEET ── */
  .trip-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 0.875rem 0.65rem;
    border-top: 1px solid var(--border);
    margin-top: 0.1rem;
    padding-top: 0.55rem;
  }

  .cancel-btn {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    padding: 0.2rem 0;
  }
  .cancel-btn:active { color: var(--red); }

  /* Confirmation bottom sheet */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(20,26,20,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.visible { display: flex; }

  .cancel-sheet {
    background: var(--white);
    border-radius: 12px 12px 0 0;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0.75rem auto 0;
  }

  .sheet-body {
    padding: 1rem 1.25rem 0.75rem;
  }

  .sheet-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }

  .sheet-refund {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    line-height: 1.6;
    margin-bottom: 0.25rem;
  }

  .sheet-refund strong {
    color: var(--peat);
    font-weight: 600;
  }

  .sheet-waitlist {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone-lt);
    font-style: italic;
    margin-bottom: 1rem;
  }

  .sheet-btns {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding-bottom: 1.5rem;
  }

  .sheet-btn-cancel {
    padding: 0.85rem;
    background: var(--red-pale);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--red);
    text-align: center;
    cursor: pointer;
    font-weight: 600;
  }

  .sheet-btn-keep {
    padding: 0.85rem;
    background: var(--forest);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: white;
    text-align: center;
    cursor: pointer;
  }
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white);
    border-top: 2px solid var(--border);
    display: flex;
    padding: 0.75rem 0 1.25rem;
    box-shadow: 0 -3px 20px rgba(20,26,20,0.1);
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.85rem;
    cursor: pointer;
    padding: 0.3rem 0;
  }

  .nav-icon { font-size: 2.4rem; }

  .nav-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--stone-lt);
  }

  .nav-item.active .nav-label { color: var(--forest-mid); }

/* == PROGRESS == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 5.5rem;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--snow);
    letter-spacing: 0.03em;
  }
  .wordmark span { color: var(--sea-a); }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--forest-mid);
    border: 1.5px solid var(--forest-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  /* ── CURRENT LEVEL CARD ── */
  .level-journey-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin: 0.875rem 0.875rem 0;
  }

  .level-journey-row .level-card {
    margin: 0;
    border-radius: 10px 0 0 10px;
    flex: 1;
  }

  .journey-mini {
    background: var(--peat);
    border-radius: 0 10px 10px 0;
    padding: 1rem 0.75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    min-width: 65px;
    position: relative;
    overflow: hidden;
  }

  .jm-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 1.4rem;
    line-height: 1;
    opacity: 0.35;
  }

  .jm-step span {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
    margin-top: 0.1rem;
  }

  .jm-step.done { opacity: 0.6; }
  .jm-step.done span { color: rgba(255,255,255,0.7); }

  .jm-step.current {
    opacity: 1;
    font-size: 1.8rem;
  }
  .jm-step.current span {
    color: white;
    font-weight: 600;
    font-size: 0.75rem;
  }

  .jm-line {
    width: 2px;
    height: 8px;
    background: rgba(255,255,255,0.2);
    margin: 0.15rem 0;
  }

  .jm-line.done {
    background: rgba(255,255,255,0.5);
  }

  .level-card {
    background: var(--peat);
    margin: 0.875rem 0.875rem 0;
    border-radius: 10px;
    padding: 1.5rem 1.25rem 1.25rem;
    position: relative;
    overflow: hidden;
  }

  /* Subtle texture */
  .level-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }

  .level-card::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.02);
  }

  .level-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--stone);
    margin-bottom: 0.3rem;
    position: relative;
    z-index: 1;
  }

  .level-card-split {
    display: flex;
    align-items: stretch;
    padding: 1rem;
    gap: 0.75rem;
  }

  .level-ladder {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 0.25rem 0.5rem;
    flex-shrink: 0;
    gap: 0.6rem;
    justify-content: center;
  }

  .ladder-step {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    opacity: 0.35;
  }

  .ladder-num {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--stone-lt);
    min-width: 2.8rem;
  }
  .ladder-step.done .ladder-num { color: var(--forest-mid); }
  .ladder-step.current .ladder-num { color: var(--p2); }

  .ladder-emoji { font-size: 1.3rem; }

  .ladder-tick {
    font-size: 0.8rem;
    color: var(--forest-mid);
    margin-left: 0.2rem;
  }
  .ladder-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--stone-lt);
    min-width: 3rem;
  }

  .ladder-step.done { opacity: 0.6; }
  .ladder-step.done .ladder-name { color: var(--stone); }

  .ladder-step.current {
    opacity: 1;
  }
  .ladder-step.current .ladder-name {
    color: var(--peat);
    font-weight: 600;
  }

  .ladder-arrow {
    color: var(--p2);
    font-size: 0.9rem;
    margin-left: 0.15rem;
  }

  .ladder-line {
    width: 2px;
    height: 10px;
    background: var(--border);
    margin: 0.15rem 0;
    align-self: flex-start;
    margin-left: 0.95rem;
  }

  .ladder-line.done {
    background: var(--forest-mid);
  }

  .level-current-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .level-animal {
    font-size: 5.5rem;
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .level-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: white;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .level-meta {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.5);
    font-style: italic;
  }

  .level-since {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    text-align: right;
  }

  .level-since-year {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: rgba(255,255,255,0.2);
    line-height: 1;
  }

  .level-since-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  /* ── STAT ROW ── */
  .stat-row {
    display: flex;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.5rem 0.875rem 0;
    overflow: hidden;
  }

  .stat-cell {
    flex: 1;
    padding: 0.875rem 0.5rem;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }

  .stat-value {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .stat-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone);
  }

  /* ── SECTION BLOCKS ── */
  .section {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .section-total {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--stone);
  }

  /* Grade grid */
  .grade-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    padding: 0.75rem 0.5rem;
    gap: 0.25rem;
  }

  .grade-grid.river-grid {
    grid-template-columns: repeat(4, 1fr);
  }

  .grade-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.6rem 0.25rem;
    border-radius: 5px;
    gap: 0.2rem;
  }

  .grade-cell.has-trips {
    background: var(--snow);
  }

  .gc-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.06em;
    color: var(--stone);
  }

  .gc-number {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.8rem;
    font-weight: 500;
    line-height: 1;
    color: var(--stone-lt);
  }

  .gc-number.active {
    color: var(--peat);
  }

  .gc-pip {
    width: 24px; height: 4px;
    border-radius: 2px;
    background: var(--border);
  }

  .gc-pip.active { background: currentColor; }

  /* ── THE JOURNEY ── */
  .journey-section {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    overflow: hidden;
  }

  .journey-header {
    padding: 0.75rem 1rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .journey-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .journey-list {
    padding: 0.5rem 0;
  }

  .journey-item {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 0.6rem 1rem;
    position: relative;
  }

  /* Vertical line connecting items */
  .journey-item:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 1.875rem;
    top: calc(50% + 18px);
    width: 1px;
    height: calc(100% - 10px);
    background: var(--border);
  }

  .journey-item.current::after {
    background: var(--border);
    border-left: 1px dashed var(--border);
  }

  .journey-animal-wrap {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .journey-animal-wrap.done {
    background: var(--peat);
  }

  .journey-animal-wrap.current {
    background: var(--peat);
    box-shadow: 0 0 0 3px var(--white), 0 0 0 5px var(--peat);
  }

  .journey-animal-wrap.future {
    background: var(--snow);
    border: 1px solid var(--border);
    filter: grayscale(0.6) opacity(0.5);
  }

  .journey-info {
    flex: 1;
  }

  .journey-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    line-height: 1.2;
  }

  .journey-name.done { color: var(--peat); }
  .journey-name.current { color: var(--peat); }
  .journey-name.future { color: var(--stone-lt); }

  .journey-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    font-style: italic;
    margin-top: 0.1rem;
  }

  .journey-sub.done { color: var(--stone); }
  .journey-sub.current { color: var(--forest-mid); font-style: normal; font-weight: 600; font-size: 1rem; letter-spacing: 0.06em; text-transform: uppercase; }
  .journey-sub.future { color: var(--stone-lt); }

  .journey-tick {
    font-size: 1.05rem;
    color: var(--stone-lt);
    flex-shrink: 0;
  }

  .journey-tick.done { color: var(--forest-mid); }

  /* Zone label */
  .zone-label {
    margin: 0 1rem 0.25rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  /* ── CORROBORATION ── */
  .corroboration {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    overflow: hidden;
  }

  .corr-header {
    padding: 0.75rem 1rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .corr-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .corr-body { padding: 0; }

  .corr-transition {
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
  }
  .corr-transition:last-child { border-bottom: none; }

  .corr-transition.pending {
    background: var(--snow);
  }

  .corr-transition-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }

  .corr-animals {
    font-size: 0.95rem;
    flex-shrink: 0;
  }

  .corr-transition-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    flex: 1;
    font-style: italic;
  }

  .corr-tick {
    font-size: 1.05rem;
    color: var(--forest-mid);
    flex-shrink: 0;
  }

  .corr-witness-row {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .corr-witness {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.5rem 0.65rem;
    border-radius: 6px;
    background: var(--white);
    border: 1px solid var(--border);
  }

  .corr-witness.tappable {
    cursor: pointer;
    transition: background 0.12s;
  }
  .corr-witness.tappable:active { background: var(--forest-pale); }

  .corr-witness.empty {
    border-style: dashed;
    opacity: 0.6;
  }

  .corr-av {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .corr-av-empty {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--snow);
    border: 1.5px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    color: var(--stone-lt);
    flex-shrink: 0;
  }

  .corr-av-info { flex: 1; min-width: 0; }

  .corr-av-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--peat);
  }

  .corr-av-level {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    font-style: italic;
  }

  .corr-av-chevron {
    font-size: 1.1rem;
    color: var(--stone-lt);
    flex-shrink: 0;
  }

  /* ── MEMBER RECORD SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(20,26,20,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.visible { display: flex; }

  .member-sheet {
    background: var(--white);
    border-radius: 12px 12px 0 0;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
    max-height: 70vh;
    overflow-y: auto;
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0.75rem auto 0;
  }

  .sheet-member-header {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .sheet-av {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .sheet-member-info { flex: 1; }

  .sheet-member-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.2;
  }

  .sheet-member-level {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
    margin-top: 0.15rem;
  }

  .sheet-view-full {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--topbar);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .sheet-stat-row {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sheet-stat {
    flex: 1;
    padding: 0.75rem 0.5rem;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .sheet-stat:last-child { border-right: none; }

  .sheet-stat-val {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1;
  }

  .sheet-stat-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone);
    margin-top: 0.15rem;
  }

  .sheet-grades {
    padding: 0.875rem 1.25rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.75rem;
  }

  .sheet-grade {
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
  }

  .sg-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--stone);
  }

  .sg-val {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
  }

  .sheet-close-btn {
    margin: 0 1.25rem 1.25rem;
    padding: 0.75rem;
    background: var(--snow);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    text-align: center;
    cursor: pointer;
  }

  /* ── TAB BAR ── */
  .tab-bar {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 52px;
    z-index: 90;
  }

  .tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 1rem 0.5rem;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    user-select: none;
  }

  .tab:active { background: var(--snow); }

  .tab::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 3px;
    border-radius: 2px;
    background: var(--topbar);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tab.active::after { opacity: 1; }

  .tab-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--stone);
    letter-spacing: 0.02em;
  }

  .tab.active .tab-label { color: var(--peat); }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white);
    border-top: 2px solid var(--border);
    display: flex;
    padding: 0.75rem 0 1.25rem;
    box-shadow: 0 -3px 20px rgba(20,26,20,0.1);
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.85rem;
    cursor: pointer;
    padding: 0.3rem 0;
  }

  .nav-icon { font-size: 2.4rem; }

  .nav-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--stone-lt);
  }

  .nav-item.active .nav-label { color: var(--forest-mid); }

/* == LEVELS == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.1rem;
    cursor: pointer;
  }

  .topbar-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: white;
    letter-spacing: 0.02em;
  }

  /* ── INTRO ── */
  .intro {
    padding: 1.25rem 1rem 0.875rem;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }

  .intro-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.5rem;
  }

  .intro-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    line-height: 1.7;
  }

  /* ── ZONE LABEL ── */
  .zone-header {
    padding: 1rem 1rem 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .zone-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .zone-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── LEVEL CARD ── */
  .level-card {
    background: var(--white);
    margin: 0 0.875rem 0.75rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    scroll-margin-top: 70px;
  }

  .level-card.current-user {
    border-color: var(--peat);
    box-shadow: 0 2px 12px rgba(20,26,20,0.1);
  }

  /* Card top strip */
  .level-top {
    padding: 1rem 1rem 0.875rem;
    display: flex;
    align-items: flex-start;
    gap: 0.875rem;
    border-bottom: 1px solid var(--border);
  }

  .level-number-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
    flex-shrink: 0;
  }

  .level-num {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .level-animal {
    font-size: 2.2rem;
    line-height: 1;
    cursor: pointer;
  }

  .level-head { flex: 1; }

  .level-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .level-subtitle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.4;
  }

  .current-badge {
    display: inline-block;
    margin-top: 0.35rem;
    padding: 0.15rem 0.5rem;
    background: var(--peat);
    border-radius: 3px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: white;
  }

  /* Description */
  .level-description {
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    line-height: 1.75;
  }

  .level-description p + p { margin-top: 0.6rem; }

  /* Craft control */
  .level-craft {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--snow);
  }

  .craft-row {
    display: flex;
    gap: 0;
  }

  .craft-channel {
    flex: 1;
    padding: 0 0.5rem;
  }
  .craft-channel:first-child { padding-left: 0; }
  .craft-channel:last-child { padding-right: 0; }

  .craft-divider {
    width: 1px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 0.5rem;
  }

  .craft-icon {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 0.3rem;
  }

  .craft-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    line-height: 1.6;
  }

  /* What you can do */
  .level-access {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .access-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .access-list {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .access-item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    line-height: 1.4;
  }

  .access-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--stone-lt);
    flex-shrink: 0;
    margin-top: 0.45rem;
  }

  .access-dot.sea   { background: var(--sea-b); }
  .access-dot.river { background: var(--riv-mid); }
  .access-dot.pool  { background: var(--p2); }
  .access-dot.all   { background: var(--peat); }

  /* How to advance */
  .level-advance {
    padding: 0.75rem 1rem;
  }

  .advance-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .advance-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    line-height: 1.65;
    font-style: italic;
  }

  .advance-corr {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
    padding: 0.5rem 0.65rem;
    background: var(--snow);
    border-radius: 5px;
    border: 1px solid var(--border);
  }

  .advance-corr-icon { font-size: 1.05rem; flex-shrink: 0; }

  .advance-corr-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--peat);
    line-height: 1.4;
  }

  /* BC qual card - different style */
  .level-card.bc-level .level-top {
    background: #f0f4f8;
  }

  .bc-label {
    display: inline-block;
    margin-top: 0.35rem;
    padding: 0.15rem 0.5rem;
    background: var(--topbar);
    border-radius: 3px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: white;
  }

  /* Aspirant special card */
  .aspirant-card {
    background: var(--amber-pale);
    border: 1px solid rgba(160,104,40,0.2);
    border-radius: 10px;
    margin: 0 0.875rem 0.75rem;
    padding: 1rem;
    display: flex;
    gap: 0.875rem;
    align-items: flex-start;
  }

  .aspirant-icon { font-size: 1.8rem; flex-shrink: 0; }

  .aspirant-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--amber);
    margin-bottom: 0.25rem;
  }

  .aspirant-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--amber);
    line-height: 1.6;
    opacity: 0.85;
  }

  /* Sticky level nav */
  .level-nav {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0.4rem 0.875rem;
    gap: 0.4rem;
    position: sticky;
    top: 52px;
    z-index: 90;
  }
  .level-nav::-webkit-scrollbar { display: none; }

  .lnav-chip {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.12s;
  }

  .lnav-chip:active { transform: scale(0.96); }

  .lnav-chip.active {
    background: var(--peat);
    border-color: var(--peat);
  }

  .lnav-animal { font-size: 1.05rem; }

  .lnav-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    white-space: nowrap;
  }

  .lnav-chip.active .lnav-label { color: white; }

/* == APPROVAL == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 7rem;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
  }

  .topbar-info { flex: 1; min-width: 0; }

  .topbar-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.06em;
  }

  /* ── QUEUE STRIP ── */
  .queue-strip {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 0.875rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 52px;
    z-index: 90;
  }
  .queue-strip::-webkit-scrollbar { display: none; }

  .queue-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    flex-shrink: 0;
    margin-right: 0.25rem;
  }

  .queue-member {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0.2rem 0.3rem;
    border-radius: 6px;
    transition: background 0.12s;
    position: relative;
  }

  .queue-member:active { background: var(--snow); }
  .queue-member.active { background: var(--forest-pale); }

  .queue-av {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    border: 2px solid transparent;
    position: relative;
  }

  .queue-member.active .queue-av {
    border-color: var(--forest);
  }

  .queue-av-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    white-space: nowrap;
    max-width: 48px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }

  .queue-member.active .queue-av-name { color: var(--forest); font-weight: 600; }

  /* Score dot on avatar */
  .queue-dot {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid white;
  }
  .queue-dot.review  { background: var(--amber); }
  .queue-dot.assess  { background: var(--red); }
  .queue-dot.ok      { background: var(--green); }

  /* ── MEMBER CARD ── */
  .member-card {
    margin: 0.875rem 0.875rem 0;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(20,26,20,0.05);
  }

  /* Card header */
  .card-header {
    padding: 1rem;
    display: flex;
    gap: 0.875rem;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }

  .card-av {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }

  .card-header-info { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.1;
    margin-bottom: 0.2rem;
  }

  .card-level {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.35rem;
  }

  .card-level-badge {
    font-size: 1rem;
  }

  .card-level-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    font-weight: 600;
  }

  .card-tenure {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
  }

  /* Auto-approval score banner */
  .score-banner {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .score-banner.review { background: #fffbf0; }
  .score-banner.assess { background: var(--red-pale); }

  .score-icon { font-size: 1.1rem; flex-shrink: 0; }

  .score-text { flex: 1; }

  .score-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--peat);
    margin-bottom: 0.1rem;
  }

  .score-reason {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.4;
  }

  /* ── TABS ── */
  .card-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .card-tab {
    flex: 1;
    padding: 0.7rem 0.5rem;
    text-align: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    cursor: pointer;
    position: relative;
    user-select: none;
  }

  .card-tab::after {
    content: '';
    position: absolute;
    bottom: 0; left: 15%; right: 15%;
    height: 2.5px;
    border-radius: 2px;
    background: var(--topbar);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .card-tab.active { color: var(--peat); font-weight: 600; }
  .card-tab.active::after { opacity: 1; }

  /* ── TAB PANELS ── */
  .card-panel { display: none; }
  .card-panel.active { display: block; }

  /* Experience panel */
  .exp-section {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .exp-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .exp-grades {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.875rem;
  }

  .exp-grade {
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
  }

  .eg-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
  }

  .eg-val {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    line-height: 1;
  }

  /* Threshold indicator */
  .threshold-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.5rem;
    padding: 0.4rem 0.6rem;
    background: var(--snow);
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .threshold-icon { font-size: 1rem; flex-shrink: 0; }

  .threshold-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.4;
  }

  .threshold-text strong { color: var(--peat); font-style: normal; }

  /* Leader private notes */
  .leader-notes {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: #fffbf0;
  }

  .notes-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.35rem;
  }

  .notes-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    line-height: 1.6;
    font-style: italic;
  }

  /* Past trips on this route */
  .past-route {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .past-route-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0;
  }

  .past-route-emoji { font-size: 1.05rem; flex-shrink: 0; }

  .past-route-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
    flex: 1;
  }

  /* ── ASSESSMENT PANEL ── */
  .assessment-q {
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .assessment-q:last-child { border-bottom: none; }

  .q-number {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.25rem;
  }

  .q-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    font-style: italic;
    margin-bottom: 0.4rem;
    line-height: 1.5;
  }

  .q-answer {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    line-height: 1.65;
  }

  /* Emoji trail */
  .emoji-trail {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.3rem;
  }

  .emoji-trail-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone-lt);
    flex-shrink: 0;
  }

  .trail-emojis {
    display: flex;
    gap: 0.2rem;
    align-items: center;
  }

  .trail-em {
    font-size: 1rem;
    line-height: 1;
  }

  .trail-arrow {
    font-size: 0.95rem;
    color: var(--stone-lt);
    flex-shrink: 0;
  }

  /* Emoji scale legend */
  .emoji-scale {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0.5rem 1rem;
    background: var(--snow);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .emoji-scale::-webkit-scrollbar { display: none; }

  .scale-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.1rem;
    flex: 1;
    min-width: 52px;
  }

  .scale-em { font-size: 1.1rem; }

  .scale-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.52rem;
    color: var(--stone);
    text-align: center;
    line-height: 1.2;
    white-space: nowrap;
  }

  /* Summary panel */
  .summary-block {
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .summary-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }

  .summary-av {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .summary-author {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    flex: 1;
    font-style: italic;
  }

  .summary-status {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    padding: 0.12rem 0.4rem;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .summary-status.endorsed {
    background: var(--green-pale);
    color: var(--green);
  }

  .summary-status.draft {
    background: var(--amber-pale);
    color: var(--amber);
  }

  .summary-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    line-height: 1.75;
  }

  .endorsements {
    margin-top: 0.75rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
  }

  .endorsement-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.4rem;
  }

  .endorsement-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0;
  }

  .endorsement-av {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem;
    flex-shrink: 0;
  }

  .endorsement-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--peat);
    font-weight: 600;
    flex: 1;
  }

  .endorsement-level {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    font-style: italic;
  }

  .endorsement-tick { font-size: 1rem; color: var(--forest-mid); }

  .endorse-btn {
    margin: 0.75rem 1rem 0;
    padding: 0.65rem;
    border: 1.5px solid var(--forest-lt);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--forest);
    text-align: center;
    cursor: pointer;
    background: var(--forest-pale);
  }

  /* ── DECISION BAR ── */
  .decision-bar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 0.65rem 0.875rem 1.1rem;
    z-index: 200;
  }

  .decision-btns {
    display: flex;
    gap: 0.5rem;
  }

  .btn-decline {
    padding: 0.8rem 0.75rem;
    background: var(--red-pale);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--red);
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    flex: 1;
  }

  .btn-ask {
    padding: 0.8rem 0.75rem;
    background: var(--snow);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    text-align: center;
    cursor: pointer;
    flex: 1;
  }

  .btn-approve {
    padding: 0.8rem 0.75rem;
    background: var(--forest);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: white;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    flex: 1;
  }

  /* ── ASK SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(20,26,20,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.visible { display: flex; }

  .ask-sheet {
    background: var(--white);
    border-radius: 12px 12px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    padding: 0 0 1.5rem;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0.75rem auto 1rem;
  }

  .sheet-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--peat);
    padding: 0 1.25rem 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }

  .ask-textarea {
    width: 100%;
    margin: 0 0 0.75rem;
    padding: 0.75rem 1.25rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    border: none;
    outline: none;
    background: transparent;
    resize: none;
    min-height: 100px;
    line-height: 1.6;
    display: block;
    border-bottom: 1px solid var(--border);
  }

  .ask-textarea::placeholder { color: var(--stone-lt); font-style: italic; }

  .ask-btns {
    display: flex;
    gap: 0.5rem;
    padding: 0 1.25rem;
  }

  .ask-send {
    flex: 1;
    padding: 0.8rem;
    background: var(--topbar);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  .ask-cancel {
    padding: 0.8rem 1rem;
    background: var(--snow);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    cursor: pointer;
  }

  /* ── CONFIRM SHEET ── */
  .confirm-sheet {
    background: var(--white);
    border-radius: 12px 12px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    padding: 0 0 1.5rem;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }

  .confirm-body {
    padding: 0 1.25rem 0.75rem;
  }

  .confirm-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.3rem;
  }

  .confirm-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 1rem;
  }

  .confirm-btns {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .confirm-yes-approve {
    padding: 0.85rem;
    background: var(--forest);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: white;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
  }

  .confirm-yes-decline {
    padding: 0.85rem;
    background: var(--red-pale);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--red);
    text-align: center;
    cursor: pointer;
    font-weight: 600;
  }

  .confirm-cancel {
    padding: 0.85rem;
    background: var(--snow);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    text-align: center;
    cursor: pointer;
  }

  /* Optional message to member */
  .optional-msg {
    padding: 0 1.25rem;
    margin-bottom: 0.75rem;
  }

  .optional-msg-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.3rem;
  }

  .optional-msg-input {
    width: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.5rem 0.65rem;
    outline: none;
    background: var(--snow);
    resize: none;
    min-height: 60px;
    line-height: 1.5;
  }
  .optional-msg-input::placeholder { color: var(--stone-lt); font-style: italic; }

/* == PARTICIPANTS == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.3rem;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0.2rem 0.3rem;
  }

  .topbar-info { flex: 1; min-width: 0; }

  .topbar-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: rgba(255,255,255,0.55);
  }

  /* ════════════════════════════════
     SCREEN 1 — PARTICIPANT LIST
  ════════════════════════════════ */

  .event-strip {
    background: var(--white);
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .event-grade-badge {
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    background: var(--sea-c);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    color: white;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .event-strip-info { flex: 1; min-width: 0; }

  .event-strip-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--peat);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-strip-date {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--stone);
    font-style: italic;
  }

  /* Leader note */
  .leader-note {
    margin: 0.75rem 0.875rem 0;
    padding: 0.6rem 0.875rem;
    background: var(--amber-pale);
    border-radius: 6px;
    border: 1px solid rgba(160,104,40,0.15);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--amber);
    line-height: 1.5;
  }

  /* Section label */
  .list-label {
    padding: 0.75rem 0.875rem 0.3rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  /* Participant row */
  .participant-row {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    transition: background 0.12s;
  }

  .participant-row:first-of-type { border-top: none; }
  .participant-row:active { background: var(--forest-pale); }

  .participant-section {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0 0.875rem;
    overflow: hidden;
  }

  .p-av {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
    border: 1.5px solid var(--border);
  }

  .p-info { flex: 1; min-width: 0; }

  .p-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--peat);
    margin-bottom: 0.15rem;
  }

  .p-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .p-level {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--stone);
  }

  .p-trail {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    font-size: 1.05rem;
  }

  .p-trail-arrow {
    font-size: 0.5rem;
    color: var(--stone-lt);
  }

  .p-approved {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--stone);
    white-space: nowrap;
  }

  .p-approved.auto { color: var(--green); border-color: var(--green-pale); background: var(--green-pale); }
  .p-approved.manual { color: var(--topbar); border-color: #d0dce8; background: #eef3f8; }

  .p-chevron {
    color: var(--stone-lt);
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  /* ICE warning for missing card */
  .ice-warning {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin: 0.5rem 0.875rem 0;
    padding: 0.5rem 0.75rem;
    background: var(--red-pale);
    border-radius: 5px;
    border: 1px solid rgba(138,26,26,0.12);
  }

  .ice-warning-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--red);
    line-height: 1.4;
  }

  /* ════════════════════════════════
     SCREEN 2 — MEMBER PROFILE (LEADER VIEW)
  ════════════════════════════════ */

  .member-header {
    background: var(--white);
    padding: 1.25rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.875rem;
    border-bottom: 1px solid var(--border);
  }

  .member-av {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }

  .member-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.45rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.1;
    margin-bottom: 0.2rem;
  }

  .member-level {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.2rem;
  }

  .member-level-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    font-weight: 600;
  }

  .member-tenure {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
  }

  /* RED ICE BUTTON */
  .ice-btn {
    margin: 0.875rem 0.875rem 0;
    padding: 0.95rem 1rem;
    background: var(--red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(138,26,26,0.25);
    transition: background 0.12s;
  }

  .ice-btn:active { background: var(--red-mid); }

  .ice-btn-left {
    display: flex;
    align-items: center;
    gap: 0.65rem;
  }

  .ice-btn-icon { font-size: 1.4rem; }

  .ice-btn-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: white;
  }

  .ice-btn-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: rgba(255,255,255,0.65);
    margin-top: 0.1rem;
  }

  .ice-btn-arrow {
    color: rgba(255,255,255,0.7);
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  /* Experience snapshot */
  .snapshot {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    overflow: hidden;
  }

  .snapshot-header {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .snapshot-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .snapshot-full {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--topbar);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }

  .snapshot-grades {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sg-col {
    flex: 1;
    padding: 0.75rem 0.875rem;
    border-right: 1px solid var(--border);
  }
  .sg-col:last-child { border-right: none; }

  .sg-track {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.35rem;
  }

  .sg-vals {
    display: flex;
    flex-wrap: wrap;
    gap: 0.2rem 0.5rem;
  }

  .sg-item {
    display: flex;
    align-items: baseline;
    gap: 0.2rem;
  }

  .sg-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
  }

  .sg-val {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
  }

  /* Emoji trail in snapshot */
  .snapshot-trail {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .trail-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone-lt);
    flex-shrink: 0;
    min-width: 80px;
  }

  .trail-ems {
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }

  .trail-em { font-size: 1rem; }
  .trail-arr { font-size: 0.95rem; color: var(--stone-lt); }

  /* Private notes section */
  .private-notes {
    padding: 0.75rem 1rem;
    background: #fffbf0;
  }

  .notes-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.3rem;
  }

  .notes-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    line-height: 1.65;
    font-style: italic;
  }

  /* ════════════════════════════════
     ICE CARD SHEET
  ════════════════════════════════ */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(80,10,10,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(3px);
  }
  .sheet-overlay.visible { display: flex; }

  .ice-sheet {
    background: var(--white);
    border-radius: 14px 14px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.2);
  }

  .ice-sheet-handle {
    width: 36px; height: 4px;
    background: rgba(138,26,26,0.2);
    border-radius: 2px;
    margin: 0.75rem auto 0;
  }

  .ice-sheet-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem 0.625rem;
    border-bottom: 1px solid rgba(138,26,26,0.1);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 10;
  }

  .ice-sheet-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .ice-sheet-close {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    cursor: pointer;
  }

  .ice-sheet-name {
    padding: 0.6rem 1.25rem;
    background: var(--red-pale);
    border-bottom: 1px solid rgba(138,26,26,0.1);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--red);
    font-style: italic;
  }

  .ice-field-row {
    padding: 0.65rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .ice-field-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    min-width: 100px;
    flex-shrink: 0;
    padding-top: 0.1rem;
  }

  .ice-field-value {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    line-height: 1.55;
    flex: 1;
  }

  .ice-field-value.highlight {
    color: var(--red);
    font-weight: 600;
  }

  .ice-section-divider {
    padding: 0.5rem 1.25rem 0.2rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    background: var(--snow);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    margin-top: 0.25rem;
  }

  .ice-call-btn {
    margin: 0.875rem 1.25rem;
    padding: 0.8rem;
    background: var(--red);
    border-radius: 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: white;
    text-align: center;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .ice-window-note {
    padding: 0 1.25rem 1.25rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone-lt);
    text-align: center;
    font-style: italic;
    line-height: 1.5;
  }

/* == POSTTRIP == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
  }

  .screen { display: none; min-height: 100vh; padding-bottom: 2rem; }
  .screen.active { display: block; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.3rem;
    cursor: pointer;
    flex-shrink: 0;
  }

  .topbar-info { flex: 1; min-width: 0; }

  .topbar-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: rgba(255,255,255,0.55);
  }

  /* View switcher pills - for demo */
  .view-switch {
    display: flex;
    gap: 0.4rem;
    padding: 0.6rem 0.875rem;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  .vs-pill {
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--stone);
    cursor: pointer;
    transition: all 0.12s;
  }

  .vs-pill.active {
    background: var(--topbar);
    border-color: var(--topbar);
    color: white;
  }

  /* ════════════════════════════════
     SCREEN 1 — MEMBER RESPONSE
  ════════════════════════════════ */

  .trip-hero {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1rem 1rem;
    display: flex;
    gap: 0.875rem;
    align-items: flex-start;
  }

  .trip-thumb {
    width: 64px; height: 64px;
    border-radius: 8px;
    background: linear-gradient(135deg, #2a4560, #005a6e);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
  }

  .trip-info { flex: 1; min-width: 0; }

  .trip-question {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.2;
    margin-bottom: 0.25rem;
  }

  .trip-meta {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
  }

  /* Emoji scale */
  .emoji-scale-wrap {
    background: var(--white);
    padding: 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .scale-instruction {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
    text-align: center;
    margin-bottom: 1rem;
  }

  .emoji-scale-row {
    display: flex;
    gap: 0;
    justify-content: space-between;
  }

  .emoji-option {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    padding: 0.75rem 0.25rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid transparent;
  }

  .emoji-option:active { transform: scale(0.95); }

  .emoji-option.selected {
    background: var(--forest-pale);
    border-color: var(--forest);
  }

  .emoji-option-em { font-size: 1.8rem; line-height: 1; }

  .emoji-option-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    text-align: center;
    line-height: 1.2;
  }

  .emoji-option.selected .emoji-option-label { color: var(--forest); font-weight: 600; }

  /* Comment field */
  .comment-wrap {
    padding: 0.875rem 0.875rem 0;
  }

  .comment-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.4rem;
  }

  .comment-input {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 0.875rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    line-height: 1.6;
    resize: none;
    min-height: 80px;
    outline: none;
    transition: border-color 0.15s;
  }

  .comment-input:focus { border-color: var(--forest-lt); }
  .comment-input::placeholder { color: var(--stone-lt); font-style: italic; }

  /* Submit button */
  .submit-bar {
    padding: 0.875rem 0.875rem 0;
  }

  .submit-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;
    cursor: pointer;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .submit-btn.ready { opacity: 1; pointer-events: auto; }

  .skip-link {
    text-align: center;
    padding: 0.75rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone-lt);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* ════════════════════════════════
     SCREEN 2 — LEADER FEEDBACK
  ════════════════════════════════ */

  .feedback-intro {
    background: var(--white);
    padding: 1rem 1rem 0.875rem;
    border-bottom: 1px solid var(--border);
  }

  .feedback-intro-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.25rem;
  }

  .feedback-intro-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.5;
  }

  .feedback-anon-note {
    margin: 0.75rem 0.875rem 0;
    padding: 0.5rem 0.75rem;
    background: var(--forest-pale);
    border-radius: 5px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--forest);
    line-height: 1.5;
  }

  /* Agreement question */
  .feedback-q {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    overflow: hidden;
  }

  .fq-text {
    padding: 0.875rem 1rem 0.5rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    line-height: 1.55;
    border-bottom: 1px solid var(--border);
  }

  .fq-scale {
    display: flex;
  }

  .fq-option {
    flex: 1;
    padding: 0.65rem 0;
    text-align: center;
    cursor: pointer;
    border-right: 1px solid var(--border);
    transition: background 0.12s;
  }

  .fq-option:last-child { border-right: none; }
  .fq-option:active { background: var(--snow); }

  .fq-option.selected { background: var(--forest-pale); }

  .fq-option-em { font-size: 1.1rem; }

  .fq-option-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.5rem;
    color: var(--stone-lt);
    margin-top: 0.15rem;
    line-height: 1.2;
  }

  .fq-option.selected .fq-option-label { color: var(--forest); }

  /* ════════════════════════════════
     SCREEN 3 — LEADER ATTENDANCE
  ════════════════════════════════ */

  .attendance-intro {
    background: var(--white);
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .attendance-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--peat);
  }

  .attendance-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--stone);
    font-style: italic;
  }

  /* Grade adjust */
  .grade-adjust {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    padding: 0.875rem 1rem;
  }

  .ga-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.6rem;
  }

  .ga-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .ga-chip {
    padding: 0.35rem 0.75rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    cursor: pointer;
    background: var(--snow);
    transition: all 0.12s;
  }

  .ga-chip.selected {
    background: var(--sea-c);
    border-color: var(--sea-c);
    color: white;

  .att-level {
    font-family: 'Plus Jakarta Sans', sans-serif;

    color: var(--stone);

  .att-toggle {

  .att-btn.cross.active { background: var(--red-pale); border-color: var(--red); }

  /* Leader emoji for member */
  .att-emoji-row {
    display: flex;
    gap: 0.2rem;
    padding: 0.4rem 1rem 0.65rem 3.65rem;

  .att-emoji-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;

  .att-em-opt {
    width: 30px; height: 30px;
    border-radius: 50%;

  .att-note-input {

    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);

    width: calc(100% - 4.65rem);

  .att-note-input::placeholder { color: var(--stone-lt); font-style: italic; }

  /* Submit done */
  .done-bar {
    padding: 0.875rem 0.875rem 0;
  }

  .done-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;

  /* ── THANK YOU ── */
  .thankyou {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

  .ty-title {

  .ty-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);

/* == PROFILE == */

  .section-title {
    font-family: 'Plus Jakarta Sans', sans-serif;

  .section-edit {
    font-family: 'Plus Jakarta Sans', sans-serif;

  .profile-row {

  .bc-qual-date {

  .signout-btn {
    margin: 0.875rem 0.875rem 0;

    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);

    font-size: 0.95rem;
    color: var(--stone);

    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.875rem;
    border-top: 1px solid var(--border);

  .leaving-option:active { background: var(--forest-pale); }

  .leaving-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    margin-top: 0.1rem;

  .leaving-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--peat);

  .leaving-destructive {

  .bottom-nav {

    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white);
    border-top: 2px solid var(--border);
    display: flex;
    padding: 0.75rem 0 1.25rem;
    box-shadow: 0 -3px 20px rgba(20,26,20,0.1);

    flex-direction: column;

    gap: 0.85rem;
    cursor: pointer;
    padding: 0.3rem 0;

  .nav-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0;
    text-transform: none;
    color: var(--stone-lt);
    text-align: center;

  #nav-calendar { padding-left: 4px; }

     ICE CARD MODAL

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,26,20,0.55);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.visible { display: flex; }

  .ice-modal {
    background: var(--white);
    border-radius: 14px 14px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.18);

    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--peat);

  .ice-modal-close {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    cursor: pointer;
    padding: 0.2rem 0.4rem;
  }

  /* Modal context note */
  .ice-modal-note {
    padding: 0.75rem 1.25rem;
    background: var(--forest-pale);
    border-bottom: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--forest);
    line-height: 1.6;
    font-style: italic;
  }

  /* ICE form sections */
  .ice-section-head {
    padding: 0.875rem 1.25rem 0.3rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    border-top: 1px solid var(--border);
    margin-top: 0.25rem;
  }

  .ice-section-head:first-of-type { border-top: none; }

  .ice-field {
    padding: 0.6rem 1.25rem;
    border-top: 1px solid var(--border);
  }

  .ice-field-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    margin-bottom: 0.25rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .ice-required {
    font-size: 0.95rem;
    background: var(--red-pale);
    color: var(--red);
    padding: 0.05rem 0.3rem;
    border-radius: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .ice-optional {

    background: var(--snow);
    color: var(--stone-lt);

    border-radius: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--border);

  .ice-input {
    width: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;

  .ice-input-note {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone-lt);
    font-style: italic;
    margin-top: 0.3rem;
    line-height: 1.4;

  .ice-photo-field {
    padding: 0.6rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.875rem;
