  .ice-photo-preview {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--snow);
    border: 1.5px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    cursor: pointer;
  }

  .ice-photo-info { flex: 1; }

  .ice-photo-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
  }

  .ice-photo-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone-lt);
    font-style: italic;
    margin-top: 0.15rem;
  }

  /* Consent section */
  .ice-consent {
    padding: 0.875rem 1.25rem;
    background: var(--snow);
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }

  .ice-consent-row {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    margin-bottom: 0.75rem;

  .ice-consent-row:last-child { margin-bottom: 0; }

  .consent-checkbox {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1.5px solid var(--forest-lt);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 0.1rem;
    transition: all 0.15s;

  .consent-checkbox.checked {
    background: var(--forest);
    border-color: var(--forest);
    color: white;
    font-size: 1.05rem;
  }

  .consent-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    line-height: 1.55;
  }

  .consent-text strong { font-weight: 600; }

  /* Save button */
  .ice-save-bar {
    padding: 0.875rem 1.25rem 1.5rem;
    border-top: 1px solid var(--border);
    position: sticky;
    bottom: 0;
    background: var(--white);
  }

  .ice-save-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;
    cursor: pointer;

  .ice-renew-note {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone-lt);
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: rgba(255,255,255,0.55);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--white);
    padding: 0.5rem 0.875rem 0.6rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .progress-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.3rem;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--forest-mid);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone-lt);
    text-align: right;
  }

  /* ── QUESTION BODY ── */
  .q-body {
    flex: 1;
    padding: 1.5rem 1rem 0;
    display: flex;
    flex-direction: column;
  }

  .q-number {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .q-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.45rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .q-hint {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.55;
    margin-bottom: 1.25rem;
  }

  /* Pre-filled note */
  .prefill-note {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.65rem;
    background: var(--forest-pale);
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-bottom: 0.75rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--forest);
    font-style: italic;
  }

  /* Text answer */
  .q-textarea {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.875rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--peat);
    line-height: 1.65;
    resize: none;
    min-height: 130px;
    outline: none;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }

  .q-textarea:focus { border-color: var(--forest-lt); }
  .q-textarea::placeholder { color: var(--stone-lt); font-style: italic; }

  /* Short answer (years) */
  .q-input {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.875rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.6rem;
    color: var(--peat);
    outline: none;
    transition: border-color 0.15s;
    text-align: center;
  }

  .q-input:focus { border-color: var(--forest-lt); }
  .q-input::placeholder { color: var(--stone-lt); font-size: 1.2rem; }

  /* Rating scale (Q4) */
  .rating-scale {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .rating-option {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 0.875rem;
    background: var(--white);
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }

  .rating-option:active { transform: scale(0.99); }

  .rating-option.selected {
    background: var(--forest-pale);
    border-color: var(--forest);
  }

  .rating-icon { font-size: 1.1rem; flex-shrink: 0; }

  .rating-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    flex: 1;
  }

  .rating-option.selected .rating-label { font-weight: 600; color: var(--forest); }

  .rating-tick {
    font-size: 1rem;
    color: var(--forest-mid);
    opacity: 0;
    flex-shrink: 0;
  }

  .rating-option.selected .rating-tick { opacity: 1; }

  /* Optional free text below rating */
  .optional-text-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone-lt);
    font-style: italic;
    margin-bottom: 0.3rem;
  }

  /* Group size chips (Q7) */
  .size-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .size-chip {
    padding: 0.5rem 1rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    cursor: pointer;
    transition: all 0.15s;
  }

  .size-chip.selected {
    background: var(--forest-pale);
    border-color: var(--forest);
    color: var(--forest);
    font-weight: 600;
  }

  /* ── BOTTOM NAV ── */
  .q-nav {
    padding: 0.875rem 1rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .btn-back {
    padding: 0.85rem 1.25rem;
    background: var(--snow);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    cursor: pointer;
    flex-shrink: 0;
  }

  .btn-next {
    flex: 1;
    padding: 0.85rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: white;
    text-align: center;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  .btn-next.subtle {
    background: var(--snow);
    border: 1px solid var(--border);
    color: var(--stone);
    letter-spacing: 0;
  }

  /* ════════════════════════════════
     SCREEN 0 — EVENT CONTEXT / ICE GATE
  ════════════════════════════════ */

  .event-card {
    margin: 0.875rem;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .event-card-top {
    background: linear-gradient(135deg, #1a3a50, var(--sea-c));
    padding: 1.25rem 1rem 1rem;
    position: relative;
  }

  .event-card-grade {
    display: inline-block;
    padding: 0.2rem 0.55rem;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: white;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .event-card-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.3rem;
    font-weight: 500;
    color: white;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  .event-card-meta {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: rgba(255,255,255,0.7);
  }

  .event-card-body {
    padding: 0.875rem 1rem;
  }

  .event-detail-row {
    display: flex;
    gap: 0.5rem;
    align-items: baseline;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
  }

  .event-detail-row:last-child { border-bottom: none; }

  .event-detail-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--stone);
    min-width: 80px;
    flex-shrink: 0;
  }

  .event-detail-value {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
  }

  /* ICE gate warning */
  .ice-gate {
    margin: 0 0.875rem;
    padding: 0.875rem 1rem;
    background: var(--amber-pale);
    border-radius: 8px;
    border: 1px solid rgba(160,104,40,0.2);
  }

  .ice-gate-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 0.3rem;
  }

  .ice-gate-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--amber);
    line-height: 1.6;
    opacity: 0.85;
  }

  .ice-gate-btn {
    margin-top: 0.65rem;
    padding: 0.6rem 0.875rem;
    background: var(--amber);
    border-radius: 5px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  /* Assessment note */
  .assessment-note {
    margin: 0.75rem 0.875rem 0;
    padding: 0.75rem 1rem;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .assessment-note-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--peat);
    margin-bottom: 0.3rem;
  }

  .assessment-note-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    color: var(--stone);
    line-height: 1.6;
    font-style: italic;
  }

  .start-btn {
    margin: 0.875rem;
    padding: 0.9rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  /* ── ANSWERS SUMMARY ── */
  .answers-summary {
    margin: 0.75rem 0.875rem 0;
  }

  .answers-header {
    padding: 0.5rem 0 0.75rem;
  }

  .answers-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.25rem;
  }

  .answers-note {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--stone);
    line-height: 1.4;
  }

  .answer-item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.75rem 0;
    border-top: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }

  .answer-item:active { background: var(--forest-pale); }

  .answer-q {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--stone);
    min-width: 0;
    flex-shrink: 0;
    width: 35%;
    line-height: 1.3;
  }

  .answer-a {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    line-height: 1.4;
    flex: 1;
  }

  .answer-edit {
    color: var(--stone-lt);
    font-size: 1rem;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .answers-actions {
    padding: 1rem 0.875rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .answers-btn-primary {
    padding: 0.9rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  .answers-btn-secondary {
    padding: 0.75rem;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    text-align: center;
    cursor: pointer;
  }

  .answers-btn-tertiary {
    padding: 0.6rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--stone);
    text-align: center;
    cursor: pointer;
  }

  .everyone-btn {
    margin: 0.75rem 0.875rem;
    padding: 0.75rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  .everyone-btn:active { opacity: 0.85; }

  .progress-privacy {
    margin: 0.75rem 0.875rem;
    padding: 0.65rem 0.875rem;
    background: var(--forest-pale);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--forest);
    line-height: 1.4;
  }

  /* ── ADMIN & SUPERMENTOR ── */
  .admin-stats {
    display: flex;
    gap: 0;
    margin: 0 0.875rem;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-top: 0.75rem;
  }

  .admin-stat {
    flex: 1;
    padding: 0.75rem 0.5rem;
    text-align: center;
    border-right: 1px solid var(--border);
  }

  .admin-stat:last-child { border-right: none; }

  .admin-stat-value {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--peat);
  }

  .admin-stat-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--stone);
    margin-top: 0.15rem;
  }

  .admin-search-wrap { padding: 0.75rem 0.875rem 0; }

  .admin-search {
    width: 100%;
    padding: 0.7rem 0.875rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
    outline: none;
  }

  .admin-search:focus { border-color: var(--topbar); }

  .admin-filters {
    display: flex;
    gap: 0.3rem;
    padding: 0.75rem 0.875rem 0.5rem;
    overflow-x: auto;
  }

  .admin-chip {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.4rem 0.75rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--stone);
    cursor: pointer;
    white-space: nowrap;
    background: var(--white);
  }

  .admin-chip.active {
    background: var(--topbar);
    color: white;
    border-color: var(--topbar);
  }

  .admin-list { padding: 0 0 6rem; }

  .admin-member {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.75rem 0.875rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .admin-member:active { background: var(--forest-pale); }

  .admin-av { font-size: 1.5rem; flex-shrink: 0; }

  .admin-info { flex: 1; }

  .admin-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--peat);
  }

  .admin-meta {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--stone);
    margin-top: 0.1rem;
  }

  .admin-status {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.2rem 0.5rem;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .admin-status.active { background: var(--green-pale); color: var(--green); }
  .admin-status.aspirant { background: var(--amber-pale); color: var(--amber); }
  .admin-status.expired { background: var(--red-pale); color: var(--red); }

  /* Admin member sheet */
  .admin-sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  .admin-sheet-overlay.visible { display: flex; }

  .admin-sheet {
    background: var(--white);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 430px;
    padding-bottom: 2rem;
  }

  .admin-sheet-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .admin-sheet-av { font-size: 2rem; }

  .admin-sheet-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--peat);
    flex: 1;
  }

  .admin-sheet-close {
    font-size: 1.2rem;
    color: var(--stone);
    cursor: pointer;
  }

  .admin-sheet-body { padding: 0.5rem 0; }

  .admin-sheet-section {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--stone-lt);
    padding: 0.5rem 1rem 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .admin-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .admin-action:active { background: var(--forest-pale); }

  .admin-action-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    color: var(--peat);
  }

  .admin-action-value {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--stone);
  }

  .admin-select {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--peat);
    padding: 0.4rem 0.6rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--snow);
    outline: none;
    cursor: pointer;
  }

  .admin-select:focus { border-color: var(--topbar); }

  .admin-action-hint {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--stone-lt);
    padding: 0 1rem 0.5rem;
    line-height: 1.3;
    font-style: italic;
  }

  .admin-action.danger .admin-action-label { color: var(--red); }

  /* Supermentor */
  .sm-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sm-tab {
    flex: 1;
    padding: 0.75rem;
    text-align: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--stone);
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }

  .sm-tab.active {
    color: var(--topbar);
    border-bottom-color: var(--topbar);
  }

  .sm-event-header {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--stone);
    padding: 1rem 0.875rem 0.5rem;
    background: var(--snow);
    border-bottom: 1px solid var(--border);
  }

  .sm-request {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.75rem 0.875rem;
    border-bottom: 1px solid var(--border);
  }

  .sm-req-av { font-size: 1.5rem; flex-shrink: 0; }

  .sm-req-info { flex: 1; }

  .sm-req-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--peat);
  }

  .sm-req-level {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--stone);
  }

  .sm-req-time {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--stone-lt);
    margin-top: 0.1rem;
  }

  .sm-req-actions {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .sm-approve, .sm-decline {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
  }

  .sm-approve {
    background: var(--green-pale);
    color: var(--green);
    border: 1px solid var(--green);
  }

  .sm-decline {
    background: var(--red-pale);
    color: var(--red);
    border: 1px solid var(--red);
  }

  .sm-member-item {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.75rem 0.875rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .sm-member-item:active { background: var(--forest-pale); }

  .sm-mem-av { font-size: 1.5rem; flex-shrink: 0; }
  .sm-mem-info { flex: 1; }

  .sm-mem-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--peat);
  }

  .sm-mem-level {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--stone);
  }

  .sm-mem-arrow {
    font-size: 1.2rem;
    color: var(--stone-lt);
  }

  .sm-extended-intro {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--stone);
    line-height: 1.4;
    padding: 0.75rem 0.875rem;
    border-bottom: 1px solid var(--border);
    background: var(--forest-pale);
  }

  .sm-extended-item {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.75rem 0.875rem;
    border-bottom: 1px solid var(--border);
  }

  .sm-extended-badge {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;

function injectDckcLogo(wrapper) {
  wrapper.querySelectorAll('.topbar').forEach(topbar => {
    if (topbar.querySelector('.dckc-logo')) return;
    topbar.insertAdjacentHTML('afterbegin', DCKC_LOGO_SVG);
    topbar.classList.add('has-logo');
  });
  // Club logo → calendar (applies to both injected and the home hero logo)
  wrapper.querySelectorAll('.dckc-logo').forEach(logo => {
    logo.style.cursor = 'pointer';
    logo.onclick = () => navigate('calendar');
  });
}

// ── NAVIGATION ──────────────────────────────

function navigate(screenId, options = {}) {
  const { back = false, params = {} } = options;

  // Update nav history
  if (!back) {
    navHistory.push(currentScreen);
  }

  currentScreen = screenId;

  // Update bottom nav active state
  updateBottomNav(screenId);

  // Load the screen
  if (screenId === 'home') {
    renderHome();
  } else {
    loadScreen(screenId, back);
  }

  // Scroll to top
  document.getElementById('screen-container').scrollTo(0, 0);
}

function goBack() {
  if (navHistory.length > 0) {
    const prev = navHistory.pop();
    navigate(prev, { back: true });
  } else {
    navigate('calendar', { back: true });
  }
}

function updateBottomNav(screenId) {
  // Find which nav tab this screen belongs to
  const navId = screens[screenId]?.nav;

  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });

  if (navId) {
    const navEl = document.getElementById('nav-' + navId);
    if (navEl) navEl.classList.add('active');
  }

  // Hide bottom nav for full-screen flows
  const hideNav = ['signup', 'create', 'posttrip'].includes(screenId);
  document.getElementById('bottomNav').style.display = hideNav ? 'none' : 'flex';
}

// ── SCREEN LOADER ────────────────────────────

function loadScreen(screenId, back) {
  const container = document.getElementById('screen-container');
  const html = screenData[screenId];
  if (!html) {
    container.innerHTML = '<div style="padding:2rem;text-align:center;font-family:serif;color:#7a8a78;">Screen not found: ' + screenId + '</div>';
    return;
  }
  const wrapper = document.createElement('div');
  wrapper.className = 'screen-wrap' + (back ? ' slide-back' : '');
  wrapper.innerHTML = html;
  container.innerHTML = '';
  container.appendChild(wrapper);
  injectDckcLogo(wrapper);
  wireNavigation(wrapper, screenId);
  const fn = window['runInit_' + screenId];
  if (fn) fn();
  if (window.twemoji) twemoji.parse(container, {
    base: 'https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/',
    folder: '',
    ext: '.svg',
    callback: function(icon, options) { return options.base + 'emoji_u' + icon.replace(/-/g, '_') + options.ext; }
  });
}

// ── NAVIGATION WIRING ────────────────────────

function wireNavigation(wrapper, screenId) {
  // Wire back buttons
  wrapper.querySelectorAll('.topbar-back, [data-back]').forEach(el => {
    el.onclick = () => goBack();
  });

  // Wordmark → home dashboard (admin/dev access)
  wrapper.querySelectorAll('.wordmark').forEach(el => {
    el.style.cursor = 'pointer';
    el.onclick = () => navigate('home');
  });

  // Screen-specific wiring
  switch (screenId) {

    case 'calendar':
      // Event cards → event detail
      wrapper.querySelectorAll('.event-card, .event-row, .event-feat').forEach(el => {
        el.onclick = (e) => {
          if (e.target.closest('.rtag, .row-avatars, .rav, .rav-more')) return;
          navigate('event');
        };
      });
      // Create event button (leader) — inject into topbar
      if (isLeader) {
        const topRight = wrapper.querySelector('.topbar-right');
        if (topRight && !topRight.querySelector('.create-btn')) {
          const btn = document.createElement('div');
          btn.className = 'create-btn';
          btn.title = 'Create event';
          btn.textContent = '+';
          btn.onclick = () => navigate('create');
          topRight.insertBefore(btn, topRight.firstChild);
        }
      }
      // Animal emoji tags on event cards → levels
      wrapper.querySelectorAll('.rtag').forEach(el => {
        const text = el.textContent;
        if (['🐸','🦆','🦦','🐬','🦭'].some(a => text.includes(a))) {
          el.style.cursor = 'pointer';
          el.onclick = (e) => { e.stopPropagation(); navigate('levels'); };
        }
      });
      // Month name → full month view
      wrapper.querySelectorAll('.month-name').forEach(el => {
        el.onclick = () => navigate('monthview');
      });
      // Coloured pips in the date strip → event detail
      wrapper.querySelectorAll('.month-strip .mev').forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = (e) => { e.stopPropagation(); navigate('event'); };
      });
      break;

    case 'monthview':
      // Put date number first, day-of-week label to its right
      wrapper.querySelectorAll('.mv3-head').forEach(head => {
        const day = head.querySelector('.mv3-day');
        const num = head.querySelector('.mv3-num');
        if (day && num && head.firstElementChild !== num) {
          head.insertBefore(num, head.firstChild);
        }
      });
      // Stack event bars at the bottom of each cell (flush across cells for multi-day)
      wrapper.querySelectorAll('.mv3-cell.has-events').forEach(cell => {
        const bars = [...cell.querySelectorAll('.mv3-ev-bar')];
        if (bars.length) {
          const strip = document.createElement('div');
          strip.className = 'mv3-bars';
          bars.forEach(b => { b.remove(); strip.appendChild(b); });
          cell.appendChild(strip);
        }
        cell.onclick = () => navigate('event');
      });
      // Move thumbnails out of cells; keep only first per row, rotate & enlarge
      wrapper.querySelectorAll('.mv3-row').forEach(row => {
        const thumbs = [...row.querySelectorAll('.mv3-thumb')];
        if (!thumbs.length) return;
        const indent = document.createElement('div');
        indent.className = 'mv3-indent';
        const first = thumbs[0];
        first.remove();
        indent.appendChild(first);
        thumbs.slice(1).forEach(t => t.remove());
        row.appendChild(indent);
      });
      // Photo tap → lightbox popup
      let lightbox = document.querySelector('.mv3-lightbox');
      if (!lightbox) {
        lightbox = document.createElement('div');
        lightbox.className = 'mv3-lightbox';
        lightbox.innerHTML = '<div class="mv3-lightbox-close">✕</div><img alt="">';
        lightbox.onclick = () => lightbox.classList.remove('open');
        document.body.appendChild(lightbox);
      }
      const bigImage = lightbox.querySelector('img');
      wrapper.querySelectorAll('.mv3-indent .mv3-thumb').forEach(img => {
        img.onclick = (e) => {
          e.stopPropagation();
          // Upgrade to a higher-res variant of the Unsplash URL
          bigImage.src = img.src.replace(/\?w=\d+/, '?w=1200');
          lightbox.classList.add('open');
        };
      });
      break;

    case 'event':
      // Hero back button → goBack
      const heroBack = wrapper.querySelector('.hero-back');
      if (heroBack) heroBack.onclick = () => goBack();
      // Participants → participant list (whole strip is tappable)
      wrapper.querySelectorAll('.participants-strip, .participants-row, .participant-avatars, [onclick*="participant"]').forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = () => navigate('participants');
      });
      // Request to join → signup
      wrapper.querySelectorAll('.bottom-signup-btn, .join-btn, .sticky-btn, [onclick*="join"]').forEach(el => {
        const text = el.textContent.toLowerCase();
        if (text.includes('join') || text.includes('request')) {
          el.onclick = () => navigate('signup');
        }
      });
      // Animal emoji → levels (hero-grade, any badge with animal)
      wrapper.querySelectorAll('.hero-grade, .grade-badge, .level-badge, .event-grade-badge').forEach(el => {
        const text = el.textContent;
        if (['🐸','🦆','🦦','🐬','🦭'].some(a => text.includes(a))) {
          el.style.cursor = 'pointer';
          el.onclick = () => navigate('levels');
        }
      });
      break;

    case 'mytrips':
      // Upcoming trip cards → event detail
      wrapper.querySelectorAll('.trip-card').forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = (e) => {
          if (e.target.closest('.cancel-btn')) return; // don't intercept cancel
          navigate('event');
        };
      });
      // Past trip cards → event detail
      wrapper.querySelectorAll('.past-trip-card').forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = () => navigate('event');
      });
      // Feedback prompt → post-trip
      wrapper.querySelectorAll('[onclick*="posttrip"], .feedback-prompt').forEach(el => {
        el.onclick = () => navigate('posttrip');
      });
      // Tally animal → levels
      wrapper.querySelectorAll('.tally-animal').forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = () => navigate('levels');
      });
      break;

    case 'progress':
      // Witness avatars → member sheet (keep existing onclick)
      // Animal level chip + journey animals → levels
      wrapper.querySelectorAll('.level-animal, .animal-chip, .journey-animal-wrap').forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = () => navigate('levels');
      });

      // Witness flow functions
      window.openWitness = function() {
        document.getElementById('witnessOverlay').classList.add('visible');
        document.getElementById('ws-search').style.display = '';
        document.getElementById('ws-steps').style.display = 'none';
        document.getElementById('ws-confirm').style.display = 'none';
        document.getElementById('witnessSearchInput').value = '';
        filterWitnessMembers('');
      };

      window.closeWitness = function() {
        document.getElementById('witnessOverlay').classList.remove('visible');
      };

      window.filterWitnessMembers = function(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('.witness-member').forEach(el => {
          const name = el.querySelector('.witness-name')?.textContent.toLowerCase() || '';
          el.style.display = (!q || name.includes(q)) ? '' : 'none';
        });
      };

      window.selectWitnessMember = function(name, emoji, level, levelNum) {
        document.getElementById('ws-search').style.display = 'none';
        document.getElementById('ws-steps').style.display = '';
        document.getElementById('witnessFor').textContent = name + ' — ' + emoji + ' ' + level + ' → next level';

        const nextSteps = {
          1: ['Confident in flat water self-rescue', 'Can hold a steady course in light wind', 'Understands basic safety signals'],
          2: ['Reliable deep water rescue', 'Comfortable in moderate conditions', 'Can navigate using a map and compass', 'Demonstrates good group awareness'],
          3: ['Leads small groups in familiar conditions', 'Strong tidal planning skills', 'Advanced rescue techniques', 'Mentors less experienced paddlers']
        };

        const steps = nextSteps[levelNum] || ['Progression steps to be defined'];
        const list = document.getElementById('witnessStepsList');
        list.innerHTML = '';
        steps.forEach(step => {
          const item = document.createElement('div');
          item.className = 'witness-step-item';
          item.innerHTML = '<div class="witness-step-icon">○</div><div class="witness-step-name">' + step + '</div><div class="witness-step-arrow">›</div>';
          item.onclick = function() { confirmWitness(name, step); };
          list.appendChild(item);
        });
      };

      window.backToSearch = function() {
        document.getElementById('ws-steps').style.display = 'none';
        document.getElementById('ws-search').style.display = '';
      };

      window.confirmWitness = function(name, step) {
        document.getElementById('ws-steps').style.display = 'none';
        document.getElementById('ws-confirm').style.display = '';
        document.getElementById('witnessConfirmText').textContent = 'You have witnessed "' + step + '" for ' + name + '. This has been recorded in their corroboration record.';
      };

      // Close overlay on background tap
      const overlay = wrapper.querySelector('#witnessOverlay');
      if (overlay) {
        overlay.onclick = function(e) {
          if (e.target === overlay) closeWitness();
        };
      }

      break;

    case 'approval':
      // Approval screen is self-contained, just wire back
      break;

    case 'participants':
      // Animal level badge → levels
      wrapper.querySelectorAll('.card-level-badge').forEach(el => {
        const text = el.textContent;
        if (['🐸','🦆','🦦','🐬','🦭'].some(a => text.includes(a))) {
          el.style.cursor = 'pointer';
          el.onclick = (e) => { e.stopPropagation(); navigate('levels'); };
        }
      });
      break;

    case 'supermentor':
      window.switchSmTab = function(tab, el) {
        wrapper.querySelectorAll('.sm-tab').forEach(function(t) { t.classList.remove('active'); });
        el.classList.add('active');
        wrapper.querySelector('#sm-approvals').style.display = tab === 'approvals' ? '' : 'none';
        wrapper.querySelector('#sm-extended').style.display = tab === 'extended' ? '' : 'none';
        wrapper.querySelector('#sm-members').style.display = tab === 'members' ? '' : 'none';
      };
      window.filterSmMembers = function(query) {
        var q = query.toLowerCase();
        wrapper.querySelectorAll('.sm-member-item').forEach(function(el) {
          var name = el.querySelector('.sm-mem-name').textContent.toLowerCase();
          el.style.display = (!q || name.includes(q)) ? '' : 'none';
        });
      };
      break;

    case 'admin':
      window.filterAdminMembers = function(query) {
        var q = query.toLowerCase();
        wrapper.querySelectorAll('.admin-member').forEach(function(el) {
          var name = el.querySelector('.admin-name').textContent.toLowerCase();
          el.style.display = (!q || name.includes(q)) ? '' : 'none';
        });
      };
      window.filterAdminRole = function(role, chip) {
        wrapper.querySelectorAll('.admin-chip').forEach(function(c) { c.classList.remove('active'); });
        chip.classList.add('active');
        wrapper.querySelectorAll('.admin-member').forEach(function(el) {
          if (role === 'all') { el.style.display = ''; }
          else { el.style.display = el.dataset.role === role ? '' : 'none'; }
        });
      };
      window.showAdminMember = function(el) {
        var name = el.querySelector('.admin-name').textContent;
        var av = el.querySelector('.admin-av').textContent;
        document.getElementById('asName').textContent = name;
        document.getElementById('asAv').textContent = av;
        document.getElementById('adminSheet').classList.add('visible');
      };
      window.closeAdminSheet = function() {
        document.getElementById('adminSheet').classList.remove('visible');

      window.updatePermissionHint = function(val) {
        var hints = {

          'psl': 'Paddlesport Leader — can create Loch/Pool sessions, Tuesday evenings, and All Away trips.',

        document.getElementById('permHint').textContent = hints[val] || '';
      };
      break;

    case 'notifications':
      // Wire collapsible sections

        document.getElementById(id).classList.toggle('collapsed');
      };
      break;

    case 'profile':
      // ICE card is self-contained within profile

<script>
// ── Modal ──
function dismissModal() {
  document.getElementById('aspirantModal').style.display = 'none';
}
document.getElementById('aspirantModal').addEventListener('click', function(e) {
  if (e.target === this) dismissModal();
});

// Month name resets filter
document.querySelector('.month-name').addEventListener('click', function() {
  activeDisc = null;
  activeGrade = null;
  document.querySelectorAll('.disc-tab').forEach(c => c.classList.remove('active'));
  gradeChips.innerHTML = '';
  applyFilter();
});

const gradeConfig = {
  sea: [
    { grade: 'sea-a', label: 'Sea A', color: 'var(--sea-a)' },
    { grade: 'sea-b', label: 'Sea B', color: 'var(--sea-b)' },
    { grade: 'sea-c', label: 'Sea C', color: 'var(--sea-c)' }
  ],
  river: [
    { grade: 'riv-lo',  label: 'G1/2', color: 'var(--riv-lo)' },
    { grade: 'riv-mid', label: 'G3',   color: 'var(--riv-mid)' },
    { grade: 'riv-hi',  label: 'G4/5', color: 'var(--riv-hi)' }
  ],
  pool: [
    { grade: 'p1', label: 'P1', color: 'var(--p1)' },
    { grade: 'p2', label: 'P2', color: 'var(--p2)' },
    { grade: 'p3', label: 'P3', color: 'var(--p3)' }
  ]
};

let activeDisc = null;
let activeGrade = null;

const gradeChips = document.getElementById('gradeChips');
const resultsInline = document.getElementById('resultsInline');

// ── Discipline tabs ──
document.querySelectorAll('.disc-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    const disc = this.dataset.disc;

    if (activeDisc === disc) {
      activeDisc = null;
      activeGrade = null;
      this.classList.remove('active');
      gradeChips.innerHTML = '';
      applyFilter();
      return;
    }

    activeDisc = disc;
    activeGrade = null;
    document.querySelectorAll('.disc-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');

    // Build grade chips inline with month nav
    gradeChips.innerHTML = '';
    if (gradeConfig[disc]) {
      gradeConfig[disc].forEach(function(g) {
        const chip = document.createElement('div');
        chip.className = 'grade-chip';
        chip.dataset.grade = g.grade;
        chip.style.color = g.color;
        chip.innerHTML = \`<div class="gchip-pip" style="background:\${g.color}"></div>\${g.label}\`;
        chip.addEventListener('click', function(e) {
          e.stopPropagation();
          if (activeGrade === g.grade) {
            activeGrade = null;
            this.classList.remove('active');
          } else {
            activeGrade = g.grade;
            document.querySelectorAll('.grade-chip').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
          }
          applyFilter();
        });
        gradeChips.appendChild(chip);
      });
    }

    applyFilter();
  });
});

// ── Apply filter ──
function applyFilter() {
  const cards = document.querySelectorAll('.event-row, .event-feat');
  let visibleCount = 0;

  cards.forEach(function(card) {
    const disc = card.dataset.disc;
    const grade = card.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    card.style.display = show ? '' : 'none';
    if (show) visibleCount++;
  });

  document.querySelectorAll('.mev').forEach(function(pip) {
    const disc = pip.dataset.disc;
    const grade = pip.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    pip.classList.toggle('faded', !show);
  });

  if (activeDisc) {
    resultsInline.textContent = \`\${visibleCount} event\${visibleCount !== 1 ? 's' : ''}\`;
    resultsInline.classList.add('visible');
  } else {
    resultsInline.textContent = '';
    resultsInline.classList.remove('visible');
  }
}
<\/script>`;

function downloadKitList() {
  const el = document.getElementById('kentallen-kit-body');
  if (!el) return;
  if (typeof html2pdf === 'undefined') {
    alert('Download library is still loading — try again in a moment.');
    return;
  }
  document.body.classList.add('pdf-rendering');
  const opts = {
    margin: [14, 12, 14, 12],
    filename: 'Kentallen-kit-list.pdf',
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['css', 'legacy'] }
  };
  html2pdf().set(opts).from(el).save().then(() => {
    document.body.classList.remove('pdf-rendering');
  }).catch(() => {
    document.body.classList.remove('pdf-rendering');
  });
}
<\/script>`;

<script>
let currentStep = 1;
const totalSteps = 6;

function selectImage(el) {
  document.querySelectorAll('.image-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function goStep(n) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('step-' + n).classList.add('active');
  currentStep = n;
  updateProgress();
  updateNav();
  window.scrollTo(0, 0);
}

function nextStep() {
  if (currentStep < totalSteps) goStep(currentStep + 1);
}

function prevStep() {
  if (currentStep > 1) goStep(currentStep - 1);
}

function updateProgress() {
  document.querySelectorAll('.step').forEach((s, i) => {
    const n = i < 2 ? Math.floor(i/1)+1 : null;
    s.classList.remove('active','done');
  });

  // Re-index steps (skipping step-lines)
  const steps = document.querySelectorAll('.step');
  const lines = document.querySelectorAll('.step-line');

  steps.forEach((s, i) => {
    const stepNum = i + 1;
    s.classList.remove('active','done');
    const circle = s.querySelector('.step-circle');
    if (stepNum < currentStep) {
      s.classList.add('done');
      circle.textContent = '✓';
    } else if (stepNum === currentStep) {
      s.classList.add('active');
      circle.textContent = stepNum;
    } else {
      circle.textContent = stepNum;
    }
  });

  lines.forEach((l, i) => {
    l.classList.toggle('done', i + 1 < currentStep);
  });
}

function updateNav() {
  const nextBtn = document.getElementById('nextBtn');
  if (currentStep === totalSteps) {
    nextBtn.textContent = 'Publish Event';
    nextBtn.className = 'btn-publish';
    nextBtn.onclick = publishEvent;
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'btn-next';
    nextBtn.onclick = nextStep;
  }
}

function publishEvent() {
  alert('Event published! 🎉');
}

function saveDraft() {
  alert('Draft saved. Only you will see this event (as a faded card) until you publish it.');
  navigate('calendar');
}

function cancelEvent() {
  if (confirm('Discard this event? Any unsaved changes will be lost.')) {
    navigate('calendar');
  }
}

function selectCat(el, type) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');

  // Show/hide grade section
  const gradeSection = document.getElementById('grade-section');
  const graded = ['sea','river','pool'];
  gradeSection.style.display = graded.includes(type) ? '' : 'none';

  // Update grade options based on type
  const picker = gradeSection.querySelector('.grade-picker');
  picker.innerHTML = '';

  const grades = {
    sea: [
      {label:'Sea A', color:'var(--sea-a)'},
      {label:'Sea B', color:'var(--sea-b)'},
      {label:'Sea C', color:'var(--sea-c)'}
    ],
    river: [
      {label:'G1', color:'var(--riv-lo)'},
      {label:'G1/2', color:'var(--riv-lo)'},
      {label:'G2', color:'var(--riv-lo)'},
      {label:'G2/3', color:'var(--riv-mid)'},
      {label:'G3', color:'var(--riv-mid)'},
      {label:'G3(4)', color:'var(--riv-mid)'},
      {label:'G4', color:'var(--riv-hi)'},
      {label:'G4/5', color:'var(--riv-hi)'},
      {label:'G5', color:'var(--riv-hi)'}
    ],
    pool: [
      {label:'P1', color:'var(--p1)'},
      {label:'P2', color:'var(--p2)'},
      {label:'P3', color:'var(--p3)'}
    ]
  };

  (grades[type] || []).forEach(g => {
    const el = document.createElement('div');
    el.className = 'grade-option';
    el.style.color = g.color;
    el.onclick = function() { selectGrade(this); };
    el.innerHTML = \`<div class="grade-pip" style="background:\${g.color}"></div><div class="grade-label">\${g.label}</div>\`;
    picker.appendChild(el);
  });
}

function selectGrade(el) {
  document.querySelectorAll('.grade-option').forEach(g => g.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleSwitch(el) {
  el.classList.toggle('on');
}

function adjustNum(field, delta) {
  const el = document.getElementById(field + '-val');
  let val = parseInt(el.textContent) + delta;
  if (val < 1) val = 1;
  if (val > 30) val = 30;
  el.textContent = val;
}

function selectLocation(name) {
  document.querySelectorAll('.saved-location').forEach(l => l.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function renderKitList() {
  const list = document.getElementById('kitList');
  if (!list) return;
  list.innerHTML = '';
  kitItems.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'kit-item';
    row.innerHTML = \`
      <div class="kit-checkbox \${item.checked ? 'checked' : ''}" onclick="toggleKitItem(\${i})">\${item.checked ? '✓' : ''}</div>
      <div class="kit-item-text \${item.checked ? 'checked-text' : ''}">\${item.text}</div>
      <div class="kit-item-del" onclick="removeKitItem(\${i})">✕</div>
    \`;
    list.appendChild(row);
  });
}

function loadTemplate(templateKey) {
  currentTemplate = templateKey;
  kitItems = (kitTemplates[templateKey] || []).map(t => ({ text: t, checked: true }));
  renderKitList();
}

function toggleKitItem(i) {
  kitItems[i].checked = !kitItems[i].checked;
  renderKitList();
}

function removeKitItem(i) {
  kitItems.splice(i, 1);
  renderKitList();
}

function addKitItem() {
  const input = document.getElementById('kitAddInput');
  const val = input.value.trim();
  if (!val) return;
  kitItems.push({ text: val, checked: true });

<script>
function scrollTo(id) {
  // Update active nav chip
  document.querySelectorAll('.lnav-chip').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // Scroll to level card
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Highlight nav chip as user scrolls
const cards = ['frog','duck','otter','dolphin','selkie'];
const chips = document.querySelectorAll('.lnav-chip');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      const idx = cards.indexOf(id);
      if (idx >= 0) {
        chips.forEach(c => c.classList.remove('active'));
        chips[idx].classList.add('active');
      }
    }
  });
}, { threshold: 0.3 });

cards.forEach(id => {
  const el = document.getElementById(id);
  if (el) observer.observe(el);
});
<\/script>`;

    scoreReason: '5 Grade C trips ✓ · 5 years membership ✓ · Otter level ✓ — but you set this event to manual review for all.'
  }
];

let currentMember = 0;
let pendingAction = null;

function showMember(idx) {
  currentMember = idx;
  const m = members[idx];

  // Update queue highlight
  document.querySelectorAll('.queue-member').forEach((q, i) => {
    q.classList.toggle('active', i === idx);
  });

  // Update card header
  document.getElementById('cardAv').textContent = m.av;
  document.getElementById('cardName').textContent = m.name;
  document.getElementById('cardTenure').textContent = m.tenure;

  // Update level (simplified - just name)
  document.querySelector('.card-level-badge').textContent = m.level.split(' ')[0];
  document.querySelector('.card-level-name').textContent = m.level.split(' ').slice(1).join(' ');

  // Update score banner
  const banner = document.getElementById('scoreBanner');
  banner.className = 'score-banner ' + m.score;
  document.getElementById('scoreTitle').textContent = m.scoreTitle;
  document.getElementById('scoreReason').textContent = m.scoreReason;

  const icon = banner.querySelector('.score-icon');
  icon.textContent = m.score === 'review' ? '⚠️' : m.score === 'assess' ? '🚫' : '✅';

  // Reset to record tab
  switchCardTab('record', document.querySelector('.card-tab'));

  // Scroll to top
  window.scrollTo(0, 0);
}

function switchCardTab(name, el) {
  document.querySelectorAll('.card-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.card-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function showAsk() {
  document.getElementById('askSheet').classList.add('visible');
}

function showConfirm(action) {
  pendingAction = action;
  const m = members[currentMember];
  const title = document.getElementById('confirmTitle');
  const sub = document.getElementById('confirmSub');
  const btns = document.getElementById('confirmBtns');

  if (action === 'approve') {
    title.textContent = \`Approve \${m.name.split(' ')[0]}?\`;
    sub.textContent = \`Their card will be charged £5 and they'll be added to the trip. You can still remove them later if needed.\`;
    btns.innerHTML = \`
      <div class="confirm-yes-approve" onclick="finalDecision('approved')">Yes, approve</div>
      <div class="confirm-cancel" onclick="closeSheet(null, 'confirmSheet')">Cancel</div>
    \`;
  } else {
    title.textContent = \`Decline \${m.name.split(' ')[0]}?\`;
    sub.textContent = \`Their card authorisation will be released and they won't be charged. You can include a message below.\`;
    btns.innerHTML = \`
      <div class="confirm-yes-decline" onclick="finalDecision('declined')">Yes, decline</div>
      <div class="confirm-cancel" onclick="closeSheet(null, 'confirmSheet')">Cancel</div>
    \`;
  }

  document.getElementById('confirmSheet').classList.add('visible');
}

function sendQuestion() {
  closeSheet(null, 'askSheet');
  alert('Question sent to Duncan. You\\'ll be notified when they reply.');
}

function finalDecision(outcome) {
  closeSheet(null, 'confirmSheet');
  const name = members[currentMember].name.split(' ')[0];
  alert(\`\${name} has been \${outcome}. \${outcome === 'approved' ? 'Payment captured and they\\'ve been notified.' : 'Authorisation released and they\\'ve been notified.'}\`);
}

function closeSheet(e, id) {
  if (!e || e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('visible');
  }
}
<\/script>`;

window.filterAdminMembers = function(query) {
  var q = query.toLowerCase();
  document.querySelectorAll('.admin-member').forEach(function(el) {
    var name = el.querySelector('.admin-name').textContent.toLowerCase();
    el.style.display = (!q || name.includes(q)) ? '' : 'none';
  });
};

window.filterAdminRole = function(role, chip) {
  document.querySelectorAll('.admin-chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  document.querySelectorAll('.admin-member').forEach(function(el) {
    if (role === 'all') { el.style.display = ''; }
    else { el.style.display = el.dataset.role === role ? '' : 'none'; }
  });
};

window.showAdminMember = function(el) {
  var name = el.querySelector('.admin-name').textContent;
  var av = el.querySelector('.admin-av').textContent;
  document.getElementById('asName').textContent = name;
  document.getElementById('asAv').textContent = av;
  document.getElementById('adminSheet').classList.add('visible');

window.runInit_calendar = function() {

function dismissModal() {

}
document.getElementById('aspirantModal').addEventListener('click', function(e) {
  if (e.target === this) dismissModal();
});

// Month name resets filter
document.querySelector('.month-name').addEventListener('click', function() {
  activeDisc = null;
  activeGrade = null;
  document.querySelectorAll('.disc-tab').forEach(c => c.classList.remove('active'));
  gradeChips.innerHTML = '';
  applyFilter();
});

const gradeConfig = {
  sea: [
    { grade: 'sea-a', label: 'Sea A', color: 'var(--sea-a)' },
    { grade: 'sea-b', label: 'Sea B', color: 'var(--sea-b)' },
    { grade: 'sea-c', label: 'Sea C', color: 'var(--sea-c)' }
  ],
  river: [
    { grade: 'riv-lo',  label: 'G1/2', color: 'var(--riv-lo)' },
    { grade: 'riv-mid', label: 'G3',   color: 'var(--riv-mid)' },
    { grade: 'riv-hi',  label: 'G4/5', color: 'var(--riv-hi)' }
  ],
  pool: [
    { grade: 'p1', label: 'P1', color: 'var(--p1)' },
    { grade: 'p2', label: 'P2', color: 'var(--p2)' },
    { grade: 'p3', label: 'P3', color: 'var(--p3)' }
  ]
};

let activeDisc = null;
let activeGrade = null;

const gradeChips = document.getElementById('gradeChips');
const resultsInline = document.getElementById('resultsInline');

// ── Discipline tabs ──
document.querySelectorAll('.disc-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    const disc = this.dataset.disc;

    if (activeDisc === disc) {
      activeDisc = null;
      activeGrade = null;
      this.classList.remove('active');
      gradeChips.innerHTML = '';
      applyFilter();
      return;
    }

    activeDisc = disc;
    activeGrade = null;
    document.querySelectorAll('.disc-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');

    // Build grade chips inline with month nav
    gradeChips.innerHTML = '';
    if (gradeConfig[disc]) {
      gradeConfig[disc].forEach(function(g) {
        const chip = document.createElement('div');
        chip.className = 'grade-chip';
        chip.dataset.grade = g.grade;
        chip.style.color = g.color;
        chip.innerHTML = `<div class="gchip-pip" style="background:${g.color}"></div>${g.label}`;
        chip.addEventListener('click', function(e) {
          e.stopPropagation();
          if (activeGrade === g.grade) {
            activeGrade = null;
            this.classList.remove('active');
          } else {
            activeGrade = g.grade;
            document.querySelectorAll('.grade-chip').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
          }
          applyFilter();
        });
        gradeChips.appendChild(chip);
      });
    }

    applyFilter();
  });
});

// ── Apply filter ──
function applyFilter() {
  const cards = document.querySelectorAll('.event-row, .event-feat');
  let visibleCount = 0;

  cards.forEach(function(card) {
    const disc = card.dataset.disc;
    const grade = card.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    card.style.display = show ? '' : 'none';
    if (show) visibleCount++;
  });

  document.querySelectorAll('.mev').forEach(function(pip) {
    const disc = pip.dataset.disc;
    const grade = pip.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    pip.classList.toggle('faded', !show);
  });

  if (activeDisc) {
    resultsInline.textContent = `${visibleCount} event${visibleCount !== 1 ? 's' : ''}`;
    resultsInline.classList.add('visible');
  } else {
    resultsInline.textContent = '';
    resultsInline.classList.remove('visible');
  }
}
  } catch(e) { console.warn('Init calendar:', e); }
};

window.goStep = function(n) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));

  currentStep = n;
  updateProgress();

window.nextStep = function() {
  if (currentStep < totalSteps) goStep(currentStep + 1);
};

window.prevStep = function() {
  if (currentStep > 1) goStep(currentStep - 1);
};

window.updateProgress = function() {
  const steps = document.querySelectorAll('.step');
  const lines = document.querySelectorAll('.step-line');

  steps.forEach((s, i) => {
    const stepNum = i + 1;
    s.classList.remove('active','done');
    const circle = s.querySelector('.step-circle');
    if (stepNum < currentStep) {
      s.classList.add('done');
      circle.textContent = '✓';
    } else if (stepNum === currentStep) {
      s.classList.add('active');
      circle.textContent = stepNum;
    } else {
      circle.textContent = stepNum;
    }
  });

  lines.forEach((l, i) => {
    l.classList.toggle('done', i + 1 < currentStep);
  });
};

window.updateNav = function() {
  const nextBtn = document.getElementById('nextBtn');
  if (currentStep === totalSteps) {
    nextBtn.textContent = 'Publish Event';
    nextBtn.className = 'btn-publish';
    nextBtn.onclick = publishEvent;
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'btn-next';
    nextBtn.onclick = nextStep;

let currentTemplate = 'sea-expedition';
let kitItems = [];

function renderKitList() {
  const list = document.getElementById('kitList');
  if (!list) return;
  list.innerHTML = '';
  kitItems.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'kit-item';
    row.innerHTML = `
      <div class="kit-checkbox ${item.checked ? 'checked' : ''}" onclick="toggleKitItem(${i})">${item.checked ? '✓' : ''}</div>
      <div class="kit-item-text ${item.checked ? 'checked-text' : ''}">${item.text}</div>
      <div class="kit-item-del" onclick="removeKitItem(${i})">✕</div>
    `;
    list.appendChild(row);
  });
}

function loadTemplate(templateKey) {
  currentTemplate = templateKey;
  kitItems = (kitTemplates[templateKey] || []).map(t => ({ text: t, checked: true }));
  renderKitList();
}

function toggleKitItem(i) {
  kitItems[i].checked = !kitItems[i].checked;
  renderKitList();
}

function removeKitItem(i) {
  kitItems.splice(i, 1);
  renderKitList();
}

function addKitItem() {
  const input = document.getElementById('kitAddInput');
  const val = input.value.trim();
  if (!val) return;
  kitItems.push({ text: val, checked: true });
  input.value = '';
  renderKitList();
}

window.runInit_levels = function() {
  try {
    // Wire chip clicks → scroll to matching level card (overrides broken inline onclick)
    const cards = ['frog','duck','otter','dolphin','selkie'];
    const chips = document.querySelectorAll('.lnav-chip');
    chips.forEach((chip, i) => {
      const id = cards[i];
      chip.onclick = (e) => {
        e.preventDefault();
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
    });

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      const idx = cards.indexOf(id);
      if (idx >= 0) {
        chips.forEach(c => c.classList.remove('active'));
        chips[idx].classList.add('active');
      }
    }
  });
}, { threshold: 0.3 });

cards.forEach(id => {
  const el = document.getElementById(id);
  if (el) observer.observe(el);
});
  } catch(e) { console.warn('Init levels:', e); }
};
