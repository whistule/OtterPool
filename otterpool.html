    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .nav-item.active .nav-label { color: var(--forest-mid); }

/* == LEVELS == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Source Serif 4', serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.1rem;
    cursor: pointer;
  }

  .topbar-title {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: white;
    letter-spacing: 0.02em;
  }

  /* ── INTRO ── */
  .intro {
    padding: 1.25rem 1rem 0.875rem;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }

  .intro-title {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.5rem;
  }

  .intro-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--stone);
    line-height: 1.7;
  }

  /* ── ZONE LABEL ── */
  .zone-header {
    padding: 1rem 1rem 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .zone-title {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .zone-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── LEVEL CARD ── */
  .level-card {
    background: var(--white);
    margin: 0 0.875rem 0.75rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    scroll-margin-top: 70px;
  }

  .level-card.current-user {
    border-color: var(--peat);
    box-shadow: 0 2px 12px rgba(20,26,20,0.1);
  }

  /* Card top strip */
  .level-top {
    padding: 1rem 1rem 0.875rem;
    display: flex;
    align-items: flex-start;
    gap: 0.875rem;
    border-bottom: 1px solid var(--border);
  }

  .level-number-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
    flex-shrink: 0;
  }

  .level-num {
    font-family: 'Source Serif 4', serif;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .level-animal {
    font-size: 2.2rem;
    line-height: 1;
    cursor: pointer;
  }

  .level-head { flex: 1; }

  .level-name {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .level-subtitle {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.4;
  }

  .current-badge {
    display: inline-block;
    margin-top: 0.35rem;
    padding: 0.15rem 0.5rem;
    background: var(--peat);
    border-radius: 3px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: white;
  }

  /* Description */
  .level-description {
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--peat);
    line-height: 1.75;
  }

  .level-description p + p { margin-top: 0.6rem; }

  /* Craft control */
  .level-craft {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--snow);
  }

  .craft-row {
    display: flex;
    gap: 0;
  }

  .craft-channel {
    flex: 1;
    padding: 0 0.5rem;
  }
  .craft-channel:first-child { padding-left: 0; }
  .craft-channel:last-child { padding-right: 0; }

  .craft-divider {
    width: 1px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 0.5rem;
  }

  .craft-icon {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 0.3rem;
  }

  .craft-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--peat);
    line-height: 1.6;
  }

  /* What you can do */
  .level-access {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .access-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .access-list {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .access-item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--peat);
    line-height: 1.4;
  }

  .access-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--stone-lt);
    flex-shrink: 0;
    margin-top: 0.45rem;
  }

  .access-dot.sea   { background: var(--sea-b); }
  .access-dot.river { background: var(--riv-mid); }
  .access-dot.pool  { background: var(--p2); }
  .access-dot.all   { background: var(--peat); }

  /* How to advance */
  .level-advance {
    padding: 0.75rem 1rem;
  }

  .advance-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .advance-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--stone);
    line-height: 1.65;
    font-style: italic;
  }

  .advance-corr {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
    padding: 0.5rem 0.65rem;
    background: var(--snow);
    border-radius: 5px;
    border: 1px solid var(--border);
  }

  .advance-corr-icon { font-size: 0.9rem; flex-shrink: 0; }

  .advance-corr-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--peat);
    line-height: 1.4;
  }

  /* BC qual card - different style */
  .level-card.bc-level .level-top {
    background: #f0f4f8;
  }

  .bc-label {
    display: inline-block;
    margin-top: 0.35rem;
    padding: 0.15rem 0.5rem;
    background: var(--topbar);
    border-radius: 3px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: white;
  }

  /* Aspirant special card */
  .aspirant-card {
    background: var(--amber-pale);
    border: 1px solid rgba(160,104,40,0.2);
    border-radius: 10px;
    margin: 0 0.875rem 0.75rem;
    padding: 1rem;
    display: flex;
    gap: 0.875rem;
    align-items: flex-start;
  }

  .aspirant-icon { font-size: 1.8rem; flex-shrink: 0; }

  .aspirant-title {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--amber);
    margin-bottom: 0.25rem;
  }

  .aspirant-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--amber);
    line-height: 1.6;
    opacity: 0.85;
  }

  /* Sticky level nav */
  .level-nav {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0.4rem 0.875rem;
    gap: 0.4rem;
    position: sticky;
    top: 52px;
    z-index: 90;
  }
  .level-nav::-webkit-scrollbar { display: none; }

  .lnav-chip {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.12s;
  }

  .lnav-chip:active { transform: scale(0.96); }

  .lnav-chip.active {
    background: var(--peat);
    border-color: var(--peat);
  }

  .lnav-animal { font-size: 0.9rem; }

  .lnav-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    white-space: nowrap;
  }

  .lnav-chip.active .lnav-label { color: white; }

/* == APPROVAL == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Source Serif 4', serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 7rem;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
  }

  .topbar-info { flex: 1; min-width: 0; }

  .topbar-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.06em;
  }

  /* ── QUEUE STRIP ── */
  .queue-strip {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 0.875rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 52px;
    z-index: 90;
  }
  .queue-strip::-webkit-scrollbar { display: none; }

  .queue-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    flex-shrink: 0;
    margin-right: 0.25rem;
  }

  .queue-member {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0.2rem 0.3rem;
    border-radius: 6px;
    transition: background 0.12s;
    position: relative;
  }

  .queue-member:active { background: var(--snow); }
  .queue-member.active { background: var(--forest-pale); }

  .queue-av {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    border: 2px solid transparent;
    position: relative;
  }

  .queue-member.active .queue-av {
    border-color: var(--forest);
  }

  .queue-av-name {
    font-family: 'Source Serif 4', serif;
    font-size: 0.58rem;
    color: var(--stone);
    white-space: nowrap;
    max-width: 48px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }

  .queue-member.active .queue-av-name { color: var(--forest); font-weight: 600; }

  /* Score dot on avatar */
  .queue-dot {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid white;
  }
  .queue-dot.review  { background: var(--amber); }
  .queue-dot.assess  { background: var(--red); }
  .queue-dot.ok      { background: var(--green); }

  /* ── MEMBER CARD ── */
  .member-card {
    margin: 0.875rem 0.875rem 0;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(20,26,20,0.05);
  }

  /* Card header */
  .card-header {
    padding: 1rem;
    display: flex;
    gap: 0.875rem;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }

  .card-av {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }

  .card-header-info { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.1;
    margin-bottom: 0.2rem;
  }

  .card-level {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.35rem;
  }

  .card-level-badge {
    font-size: 1rem;
  }

  .card-level-name {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--peat);
    font-weight: 600;
  }

  .card-tenure {
    font-family: 'Source Serif 4', serif;
    font-size: 0.7rem;
    color: var(--stone);
    font-style: italic;
  }

  /* Auto-approval score banner */
  .score-banner {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .score-banner.review { background: #fffbf0; }
  .score-banner.assess { background: var(--red-pale); }

  .score-icon { font-size: 1.1rem; flex-shrink: 0; }

  .score-text { flex: 1; }

  .score-title {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--peat);
    margin-bottom: 0.1rem;
  }

  .score-reason {
    font-family: 'Source Serif 4', serif;
    font-size: 0.68rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.4;
  }

  /* ── TABS ── */
  .card-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .card-tab {
    flex: 1;
    padding: 0.7rem 0.5rem;
    text-align: center;
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--stone);
    cursor: pointer;
    position: relative;
    user-select: none;
  }

  .card-tab::after {
    content: '';
    position: absolute;
    bottom: 0; left: 15%; right: 15%;
    height: 2.5px;
    border-radius: 2px;
    background: var(--topbar);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .card-tab.active { color: var(--peat); font-weight: 600; }
  .card-tab.active::after { opacity: 1; }

  /* ── TAB PANELS ── */
  .card-panel { display: none; }
  .card-panel.active { display: block; }

  /* Experience panel */
  .exp-section {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .exp-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .exp-grades {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.875rem;
  }

  .exp-grade {
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
  }

  .eg-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--stone);
  }

  .eg-val {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 500;
    line-height: 1;
  }

  /* Threshold indicator */
  .threshold-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.5rem;
    padding: 0.4rem 0.6rem;
    background: var(--snow);
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .threshold-icon { font-size: 0.85rem; flex-shrink: 0; }

  .threshold-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.68rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.4;
  }

  .threshold-text strong { color: var(--peat); font-style: normal; }

  /* Leader private notes */
  .leader-notes {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: #fffbf0;
  }

  .notes-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.35rem;
  }

  .notes-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--peat);
    line-height: 1.6;
    font-style: italic;
  }

  /* Past trips on this route */
  .past-route {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .past-route-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0;
  }

  .past-route-emoji { font-size: 0.9rem; flex-shrink: 0; }

  .past-route-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--stone);
    font-style: italic;
    flex: 1;
  }

  /* ── ASSESSMENT PANEL ── */

    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .assessment-q:last-child { border-bottom: none; }

  .q-number {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.25rem;
  }

  .q-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--stone);
    font-style: italic;
    margin-bottom: 0.4rem;
    line-height: 1.5;
  }

  .q-answer {
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    color: var(--peat);
    line-height: 1.65;

  /* Emoji trail */
  .emoji-trail {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.3rem;
  }

  .emoji-trail-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone-lt);
    flex-shrink: 0;
  }

  .trail-emojis {
    display: flex;
    gap: 0.2rem;
    align-items: center;
  }

  .trail-em {
    font-size: 1rem;
    line-height: 1;
  }

  .trail-arrow {
    font-size: 0.6rem;
    color: var(--stone-lt);
    flex-shrink: 0;
  }

  /* Emoji scale legend */
  .emoji-scale {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0.5rem 1rem;
    background: var(--snow);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .emoji-scale::-webkit-scrollbar { display: none; }

  .scale-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.1rem;
    flex: 1;
    min-width: 52px;
  }

  .scale-em { font-size: 1.1rem; }

  .scale-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.52rem;
    color: var(--stone);
    text-align: center;
    line-height: 1.2;
    white-space: nowrap;
  }

  /* Summary panel */
  .summary-block {
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .summary-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }

  .summary-av {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .summary-author {
    font-family: 'Source Serif 4', serif;
    font-size: 0.7rem;
    color: var(--stone);
    flex: 1;
    font-style: italic;
  }

  .summary-status {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    padding: 0.12rem 0.4rem;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .summary-status.endorsed {
    background: var(--green-pale);
    color: var(--green);
  }

  .summary-status.draft {
    background: var(--amber-pale);
    color: var(--amber);
  }

  .summary-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    color: var(--peat);
    line-height: 1.75;
  }

  .endorsements {
    margin-top: 0.75rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
  }

  .endorsement-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.4rem;
  }

  .endorsement-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0;
  }

  .endorsement-av {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
  }

  .endorsement-name {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--peat);
    font-weight: 600;
    flex: 1;
  }

  .endorsement-level {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    font-style: italic;
  }

  .endorsement-tick { font-size: 0.85rem; color: var(--forest-mid); }

  .endorse-btn {
    margin: 0.75rem 1rem 0;
    padding: 0.65rem;
    border: 1.5px solid var(--forest-lt);
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--forest);
    text-align: center;
    cursor: pointer;
    background: var(--forest-pale);
  }

  /* ── DECISION BAR ── */
  .decision-bar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 0.65rem 0.875rem 1.1rem;
    z-index: 200;
  }

  .decision-btns {
    display: flex;
    gap: 0.5rem;
  }

  .btn-decline {
    padding: 0.8rem 0.75rem;
    background: var(--red-pale);
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--red);
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    flex: 1;
  }

  .btn-ask {
    padding: 0.8rem 0.75rem;
    background: var(--snow);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--peat);
    text-align: center;
    cursor: pointer;
    flex: 1;
  }

  .btn-approve {
    padding: 0.8rem 0.75rem;
    background: var(--forest);
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: white;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    flex: 1;
  }

  /* ── ASK SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(20,26,20,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.visible { display: flex; }

  .ask-sheet {
    background: var(--white);
    border-radius: 12px 12px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    padding: 0 0 1.5rem;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0.75rem auto 1rem;
  }

  .sheet-title {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--peat);
    padding: 0 1.25rem 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }

  .ask-textarea {
    width: 100%;
    margin: 0 0 0.75rem;
    padding: 0.75rem 1.25rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    color: var(--peat);
    border: none;
    outline: none;
    background: transparent;
    resize: none;
    min-height: 100px;
    line-height: 1.6;
    display: block;
    border-bottom: 1px solid var(--border);
  }

  .ask-textarea::placeholder { color: var(--stone-lt); font-style: italic; }

  .ask-btns {
    display: flex;
    gap: 0.5rem;
    padding: 0 1.25rem;
  }

  .ask-send {
    flex: 1;
    padding: 0.8rem;
    background: var(--topbar);
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  .ask-cancel {
    padding: 0.8rem 1rem;
    background: var(--snow);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--stone);
    cursor: pointer;
  }

  /* ── CONFIRM SHEET ── */
  .confirm-sheet {
    background: var(--white);
    border-radius: 12px 12px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    padding: 0 0 1.5rem;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }

  .confirm-body {
    padding: 0 1.25rem 0.75rem;
  }

  .confirm-title {
    font-family: 'Fraunces', serif;
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.3rem;
  }

  .confirm-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--stone);
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 1rem;
  }

  .confirm-btns {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .confirm-yes-approve {
    padding: 0.85rem;
    background: var(--forest);
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: white;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
  }

  .confirm-yes-decline {
    padding: 0.85rem;
    background: var(--red-pale);
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--red);
    text-align: center;
    cursor: pointer;
    font-weight: 600;
  }

  .confirm-cancel {
    padding: 0.85rem;
    background: var(--snow);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--stone);
    text-align: center;
    cursor: pointer;
  }

  /* Optional message to member */
  .optional-msg {
    padding: 0 1.25rem;
    margin-bottom: 0.75rem;
  }

  .optional-msg-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.3rem;
  }

  .optional-msg-input {
    width: 100%;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--peat);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.5rem 0.65rem;
    outline: none;
    background: var(--snow);
    resize: none;
    min-height: 60px;
    line-height: 1.5;
  }
  .optional-msg-input::placeholder { color: var(--stone-lt); font-style: italic; }

/* == PARTICIPANTS == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Source Serif 4', serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.3rem;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0.2rem 0.3rem;
  }

  .topbar-info { flex: 1; min-width: 0; }

  .topbar-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.55);
  }

  /* ════════════════════════════════
     SCREEN 1 — PARTICIPANT LIST
  ════════════════════════════════ */

  .event-strip {
    background: var(--white);
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .event-grade-badge {
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    background: var(--sea-c);
    font-family: 'Source Serif 4', serif;
    font-size: 0.68rem;
    font-weight: 600;
    color: white;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .event-strip-info { flex: 1; min-width: 0; }

  .event-strip-title {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--peat);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-strip-date {
    font-family: 'Source Serif 4', serif;
    font-size: 0.68rem;
    color: var(--stone);
    font-style: italic;
  }

  /* Leader note */
  .leader-note {
    margin: 0.75rem 0.875rem 0;
    padding: 0.6rem 0.875rem;
    background: var(--amber-pale);
    border-radius: 6px;
    border: 1px solid rgba(160,104,40,0.15);
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--amber);
    line-height: 1.5;
  }

  /* Section label */
  .list-label {
    padding: 0.75rem 0.875rem 0.3rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  /* Participant row */
  .participant-row {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    transition: background 0.12s;
  }

  .participant-row:first-of-type { border-top: none; }
  .participant-row:active { background: var(--forest-pale); }

  .participant-section {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0 0.875rem;
    overflow: hidden;
  }

  .p-av {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
    border: 1.5px solid var(--border);
  }

  .p-info { flex: 1; min-width: 0; }

  .p-name {
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--peat);
    margin-bottom: 0.15rem;
  }

  .p-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .p-level {
    font-family: 'Source Serif 4', serif;
    font-size: 0.68rem;
    color: var(--stone);
  }

  .p-trail {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    font-size: 0.72rem;
  }

  .p-trail-arrow {
    font-size: 0.5rem;
    color: var(--stone-lt);
  }

  .p-approved {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--stone);
    white-space: nowrap;
  }

  .p-approved.auto { color: var(--green); border-color: var(--green-pale); background: var(--green-pale); }
  .p-approved.manual { color: var(--topbar); border-color: #d0dce8; background: #eef3f8; }

  .p-chevron {
    color: var(--stone-lt);
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  /* ICE warning for missing card */
  .ice-warning {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin: 0.5rem 0.875rem 0;
    padding: 0.5rem 0.75rem;
    background: var(--red-pale);
    border-radius: 5px;
    border: 1px solid rgba(138,26,26,0.12);
  }

  .ice-warning-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.7rem;
    color: var(--red);
    line-height: 1.4;
  }

  /* ════════════════════════════════
     SCREEN 2 — MEMBER PROFILE (LEADER VIEW)
  ════════════════════════════════ */

  .member-header {
    background: var(--white);
    padding: 1.25rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.875rem;
    border-bottom: 1px solid var(--border);
  }

  .member-av {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }

  .member-name {
    font-family: 'Fraunces', serif;
    font-size: 1.45rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.1;
    margin-bottom: 0.2rem;
  }

  .member-level {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.2rem;
  }

  .member-level-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.8rem;
    color: var(--peat);
    font-weight: 600;
  }

  .member-tenure {
    font-family: 'Source Serif 4', serif;
    font-size: 0.7rem;
    color: var(--stone);
    font-style: italic;
  }

  /* RED ICE BUTTON */
  .ice-btn {
    margin: 0.875rem 0.875rem 0;
    padding: 0.95rem 1rem;
    background: var(--red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(138,26,26,0.25);
    transition: background 0.12s;
  }

  .ice-btn:active { background: var(--red-mid); }

  .ice-btn-left {
    display: flex;
    align-items: center;
    gap: 0.65rem;
  }

  .ice-btn-icon { font-size: 1.4rem; }

  .ice-btn-title {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: white;
  }

  .ice-btn-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.65);
    margin-top: 0.1rem;
  }

  .ice-btn-arrow {
    color: rgba(255,255,255,0.7);
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  /* Experience snapshot */
  .snapshot {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    overflow: hidden;
  }

  .snapshot-header {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .snapshot-title {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .snapshot-full {
    font-family: 'Source Serif 4', serif;
    font-size: 0.7rem;
    color: var(--topbar);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }

  .snapshot-grades {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sg-col {
    flex: 1;
    padding: 0.75rem 0.875rem;
    border-right: 1px solid var(--border);
  }
  .sg-col:last-child { border-right: none; }

  .sg-track {
    font-family: 'Source Serif 4', serif;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.35rem;
  }

  .sg-vals {
    display: flex;
    flex-wrap: wrap;
    gap: 0.2rem 0.5rem;
  }

  .sg-item {
    display: flex;
    align-items: baseline;
    gap: 0.2rem;
  }

  .sg-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    color: var(--stone);
  }

  .sg-val {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 500;
  }

  /* Emoji trail in snapshot */
  .snapshot-trail {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .trail-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone-lt);
    flex-shrink: 0;
    min-width: 80px;
  }

  .trail-ems {
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }

  .trail-em { font-size: 1rem; }
  .trail-arr { font-size: 0.55rem; color: var(--stone-lt); }

  /* Private notes section */
  .private-notes {
    padding: 0.75rem 1rem;
    background: #fffbf0;
  }

  .notes-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.3rem;
  }

  .notes-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--peat);
    line-height: 1.65;
    font-style: italic;
  }

  /* ════════════════════════════════
     ICE CARD SHEET
  ════════════════════════════════ */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(80,10,10,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(3px);
  }
  .sheet-overlay.visible { display: flex; }

  .ice-sheet {
    background: var(--white);
    border-radius: 14px 14px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.2);
  }

  .ice-sheet-handle {
    width: 36px; height: 4px;
    background: rgba(138,26,26,0.2);
    border-radius: 2px;
    margin: 0.75rem auto 0;
  }

  .ice-sheet-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem 0.625rem;
    border-bottom: 1px solid rgba(138,26,26,0.1);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 10;
  }

  .ice-sheet-title {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .ice-sheet-close {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--stone);
    cursor: pointer;
  }

  .ice-sheet-name {
    padding: 0.6rem 1.25rem;
    background: var(--red-pale);
    border-bottom: 1px solid rgba(138,26,26,0.1);
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    color: var(--red);
    font-style: italic;
  }

  .ice-field-row {
    padding: 0.65rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .ice-field-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    min-width: 100px;
    flex-shrink: 0;
    padding-top: 0.1rem;
  }

  .ice-field-value {
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    color: var(--peat);
    line-height: 1.55;
    flex: 1;
  }

  .ice-field-value.highlight {
    color: var(--red);
    font-weight: 600;
  }

  .bc-qual-date {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    font-style: italic;
  }

  .bc-qual-tick { color: var(--forest-mid); font-size: 0.9rem; }

  /* ── SIGN OUT ── */
  .signout-btn {
    margin: 0.875rem 0.875rem 0;
    padding: 0.8rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--white);
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--stone);
    text-align: center;
    cursor: pointer;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 0.45rem 0 0.85rem;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.18rem;
    cursor: pointer;
    padding: 0.3rem 0;
  }

  .nav-icon { font-size: 1.3rem; }

  .nav-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  .nav-item.active .nav-label { color: var(--forest-mid); }

  /* ════════════════════════════════════════
     ICE CARD MODAL
  ════════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,26,20,0.55);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.visible { display: flex; }

  .ice-modal {
    background: var(--white);
    border-radius: 14px 14px 0 0;
    width: 100%; max-width: 430px;
    margin: 0 auto;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
  }

  .ice-modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0.75rem auto 0;
  }

  /* Modal top bar */
  .ice-modal-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem 0.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 10;
  }

  .ice-modal-title {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--peat);
  }

  .ice-modal-close {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--stone);
    cursor: pointer;
    padding: 0.2rem 0.4rem;
  }

  /* Modal context note */
  .ice-modal-note {
    padding: 0.75rem 1.25rem;
    background: var(--forest-pale);
    border-bottom: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--forest);
    line-height: 1.6;
    font-style: italic;
  }

  /* ICE form sections */
  .ice-section-head {
    padding: 0.875rem 1.25rem 0.3rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    border-top: 1px solid var(--border);
    margin-top: 0.25rem;
  }

  .ice-section-head:first-of-type { border-top: none; }

  .ice-field {
    padding: 0.6rem 1.25rem;
    border-top: 1px solid var(--border);
  }

  .ice-field-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    margin-bottom: 0.25rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .ice-required {
    font-size: 0.55rem;
    background: var(--red-pale);
    color: var(--red);
    padding: 0.05rem 0.3rem;
    border-radius: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .ice-optional {
    font-size: 0.55rem;
    background: var(--snow);
    color: var(--stone-lt);
    padding: 0.05rem 0.3rem;
    border-radius: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--border);
  }

  .ice-input {
    width: 100%;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    color: var(--peat);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.5rem 0.65rem;
    outline: none;
    background: var(--snow);
    transition: border-color 0.15s;
  }

  .ice-input:focus { border-color: var(--forest-lt); background: var(--white); }
  .ice-input::placeholder { color: var(--stone-lt); font-style: italic; }

  .ice-input.textarea {
    resize: none;
    min-height: 70px;
    line-height: 1.55;
  }

  .ice-input-note {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    color: var(--stone-lt);
    font-style: italic;
    margin-top: 0.3rem;
    line-height: 1.4;
  }

  /* Photo upload field */
  .ice-photo-field {
    padding: 0.6rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.875rem;
  }

  .ice-photo-preview {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--snow);
    border: 1.5px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    cursor: pointer;
  }

  .ice-photo-info { flex: 1; }

  .ice-photo-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--stone);
  }

  .ice-photo-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    color: var(--stone-lt);
    font-style: italic;
    margin-top: 0.15rem;
  }

  /* Consent section */
  .ice-consent {
    padding: 0.875rem 1.25rem;
    background: var(--snow);
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }

  .ice-consent-row {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    margin-bottom: 0.75rem;
  }
  .ice-consent-row:last-child { margin-bottom: 0; }

  .consent-checkbox {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1.5px solid var(--forest-lt);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 0.1rem;
    transition: all 0.15s;
  }

  .consent-checkbox.checked {
    background: var(--forest);
    border-color: var(--forest);
    color: white;
    font-size: 0.7rem;
  }

  .consent-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--peat);
    line-height: 1.55;
  }

  .consent-text strong { font-weight: 600; }

  /* Save button */
  .ice-save-bar {
    padding: 0.875rem 1.25rem 1.5rem;
    border-top: 1px solid var(--border);
    position: sticky;
    bottom: 0;
    background: var(--white);
  }

  .ice-save-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  .ice-renew-note {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone-lt);
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;
  }

/* == SIGNUP == */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--snow);
    font-family: 'Source Serif 4', serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
  }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
    flex-shrink: 0;
  }

  .topbar-back {
    color: rgba(255,255,255,0.7);
    font-size: 1.3rem;
    cursor: pointer;
    flex-shrink: 0;
  }

  .topbar-info { flex: 1; min-width: 0; }

  .topbar-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.55);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--white);
    padding: 0.5rem 0.875rem 0.6rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .progress-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.3rem;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--forest-mid);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.62rem;
    color: var(--stone-lt);
    text-align: right;
  }

  /* ── QUESTION BODY ── */
  .q-body {
    flex: 1;
    padding: 1.5rem 1rem 0;
    display: flex;
    flex-direction: column;
  }

  .q-number {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stone-lt);
    margin-bottom: 0.5rem;
  }

  .q-text {
    font-family: 'Fraunces', serif;
    font-size: 1.45rem;
    font-weight: 500;
    color: var(--peat);
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .q-hint {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.55;
    margin-bottom: 1.25rem;
  }

  /* Pre-filled note */
  .prefill-note {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.65rem;
    background: var(--forest-pale);
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-bottom: 0.75rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--forest);
    font-style: italic;
  }

  /* Text answer */
  .q-textarea {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.875rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    color: var(--peat);
    line-height: 1.65;
    resize: none;
    min-height: 130px;
    outline: none;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }

  .q-textarea:focus { border-color: var(--forest-lt); }
  .q-textarea::placeholder { color: var(--stone-lt); font-style: italic; }

  /* Short answer (years) */
  .q-input {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.875rem;
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    color: var(--peat);
    outline: none;
    transition: border-color 0.15s;
    text-align: center;
  }

  .q-input:focus { border-color: var(--forest-lt); }
  .q-input::placeholder { color: var(--stone-lt); font-size: 1.2rem; }

  /* Rating scale (Q4) */
  .rating-scale {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .rating-option {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 0.875rem;
    background: var(--white);
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }

  .rating-option:active { transform: scale(0.99); }

  .rating-option.selected {
    background: var(--forest-pale);
    border-color: var(--forest);
  }

  .rating-icon { font-size: 1.1rem; flex-shrink: 0; }

  .rating-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--peat);
    flex: 1;
  }

  .rating-option.selected .rating-label { font-weight: 600; color: var(--forest); }

  .rating-tick {
    font-size: 0.85rem;
    color: var(--forest-mid);
    opacity: 0;
    flex-shrink: 0;
  }

  .rating-option.selected .rating-tick { opacity: 1; }

  /* Optional free text below rating */
  .optional-text-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone-lt);
    font-style: italic;
    margin-bottom: 0.3rem;
  }

  /* Group size chips (Q7) */
  .size-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .size-chip {
    padding: 0.5rem 1rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--stone);
    cursor: pointer;
    transition: all 0.15s;
  }

  .size-chip.selected {
    background: var(--forest-pale);
    border-color: var(--forest);
    color: var(--forest);
    font-weight: 600;
  }

  /* ── BOTTOM NAV ── */
  .q-nav {
    padding: 0.875rem 1rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .btn-back {
    padding: 0.85rem 1.25rem;
    background: var(--snow);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--stone);
    cursor: pointer;
    flex-shrink: 0;
  }

  .btn-next {
    flex: 1;
    padding: 0.85rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: white;
    text-align: center;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  .btn-next.subtle {
    background: var(--snow);
    border: 1px solid var(--border);
    color: var(--stone);
    letter-spacing: 0;
  }

  /* ════════════════════════════════
     SCREEN 0 — EVENT CONTEXT / ICE GATE
  ════════════════════════════════ */

  .event-card {
    margin: 0.875rem;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .event-card-top {
    background: linear-gradient(135deg, #1a3a50, var(--sea-c));
    padding: 1.25rem 1rem 1rem;
    position: relative;
  }

  .event-card-grade {
    display: inline-block;
    padding: 0.2rem 0.55rem;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: white;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .event-card-title {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 500;
    color: white;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  .event-card-meta {
    font-family: 'Source Serif 4', serif;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.7);
  }

  .event-card-body {
    padding: 0.875rem 1rem;
  }

  .event-detail-row {
    display: flex;
    gap: 0.5rem;
    align-items: baseline;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
  }

  .event-detail-row:last-child { border-bottom: none; }

  .event-detail-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    min-width: 80px;
    flex-shrink: 0;
  }

  .event-detail-value {
    font-family: 'Source Serif 4', serif;
    font-size: 0.8rem;
    color: var(--peat);
  }

  /* ICE gate warning */
  .ice-gate {
    margin: 0 0.875rem;
    padding: 0.875rem 1rem;
    background: var(--amber-pale);
    border-radius: 8px;
    border: 1px solid rgba(160,104,40,0.2);
  }

  .ice-gate-title {
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 0.3rem;
  }

  .ice-gate-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--amber);
    line-height: 1.6;
    opacity: 0.85;
  }

  .ice-gate-btn {
    margin-top: 0.65rem;
    padding: 0.6rem 0.875rem;
    background: var(--amber);
    border-radius: 5px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  /* Assessment note */
  .assessment-note {
    margin: 0.75rem 0.875rem 0;
    padding: 0.75rem 1rem;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .assessment-note-title {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--peat);
    margin-bottom: 0.3rem;
  }

  .assessment-note-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--stone);
    line-height: 1.6;
    font-style: italic;
  }

  .start-btn {
    margin: 0.875rem;
    padding: 0.9rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;
    cursor: pointer;
  }

  /* ════════════════════════════════
     SCREEN REVIEW
  ════════════════════════════════ */

  .review-section {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0.75rem 0.875rem 0;
    overflow: hidden;
  }

  .review-section-head {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .review-edit {
    color: var(--forest);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    font-size: 0.68rem;
    letter-spacing: 0;
    text-transform: none;
  }

  .review-row {
    padding: 0.65rem 1rem;
    border-top: 1px solid var(--border);
  }

  .review-q {
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    margin-bottom: 0.2rem;
    font-style: italic;
  }

  .review-a {
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--peat);
    line-height: 1.55;
  }

  .submit-note {
    margin: 0.75rem 0.875rem 0;
    font-family: 'Source Serif 4', serif;
    font-size: 0.7rem;
    color: var(--stone-lt);
    text-align: center;
    font-style: italic;
    line-height: 1.5;
  }

  .submit-final-btn {
    margin: 0.75rem 0.875rem 1.5rem;
    padding: 0.95rem;
    background: var(--forest);
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(44,74,46,0.25);
  }

  /* ════════════════════════════════
     SCREEN SENT
  ════════════════════════════════ */

  .sent-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    padding: 2rem;
    text-align: center;
  }

  .sent-icon { font-size: 3rem; margin-bottom: 1.25rem; }

  .sent-title {
    font-family: 'Fraunces', serif;
    font-size: 1.7rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.6rem;
    line-height: 1.2;
  }

  .sent-sub {
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    color: var(--stone);
    line-height: 1.7;
    font-style: italic;
    max-width: 290px;
    margin-bottom: 1.5rem;
  }

  .sent-status {
    padding: 0.6rem 1.25rem;
    background: var(--amber-pale);

// ── NAVIGATION ──────────────────────────────

function navigate(screenId, options = {}) {
  const { back = false, params = {} } = options;

  // Update nav history
  if (!back) {
    navHistory.push(currentScreen);
  }

  currentScreen = screenId;

  // Update bottom nav active state
  updateBottomNav(screenId);

  // Load the screen
  if (screenId === 'home') {
    renderHome();
  } else {
    loadScreen(screenId, back);
  }

  // Scroll to top
  document.getElementById('screen-container').scrollTo(0, 0);
}

function goBack() {
  if (navHistory.length > 0) {
    const prev = navHistory.pop();
    navigate(prev, { back: true });
  } else {
    navigate('calendar', { back: true });
  }
}

function updateBottomNav(screenId) {
  // Find which nav tab this screen belongs to
  const navId = screens[screenId]?.nav;

  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });

  if (navId) {
    const navEl = document.getElementById('nav-' + navId);
    if (navEl) navEl.classList.add('active');
  }

  // Hide bottom nav for full-screen flows
  const hideNav = ['signup', 'create', 'posttrip'].includes(screenId);
  document.getElementById('bottomNav').style.display = hideNav ? 'none' : 'flex';
}

// ── SCREEN LOADER ────────────────────────────

function loadScreen(screenId, back) {
  const container = document.getElementById('screen-container');
  const html = screenData[screenId];
  if (!html) {
    container.innerHTML = '<div style="padding:2rem;text-align:center;font-family:serif;color:#7a8a78;">Screen not found: ' + screenId + '</div>';
    return;
  }
  const wrapper = document.createElement('div');
  wrapper.className = 'screen-wrap' + (back ? ' slide-back' : '');
  wrapper.innerHTML = html;
  container.innerHTML = '';
  container.appendChild(wrapper);
  wireNavigation(wrapper, screenId);
  const fn = window['runInit_' + screenId];
  if (fn) fn();
}

// ── NAVIGATION WIRING ────────────────────────

function wireNavigation(wrapper, screenId) {
  // Wire back buttons
  wrapper.querySelectorAll('.topbar-back, [data-back]').forEach(el => {
    el.onclick = () => goBack();
  });

  // Screen-specific wiring
  switch (screenId) {

    case 'calendar':
      // Event cards → event detail
      wrapper.querySelectorAll('.event-card, .event-row, [onclick*="event"]').forEach(el => {
        const orig = el.getAttribute('onclick');
        if (!orig || orig.includes('navigate')) return;
        el.onclick = () => navigate('event');
      });
      // Create event button (leader)
      const createBtn = wrapper.querySelector('.create-btn, [onclick*="create"]');
      if (createBtn) createBtn.onclick = () => navigate('create');
      break;

    case 'event':
      // Participants → participant list
      wrapper.querySelectorAll('.participants-row, .participant-avatars, [onclick*="participant"]').forEach(el => {
        el.onclick = () => navigate('participants');
      });
      // Request to join → signup
      wrapper.querySelectorAll('.join-btn, .sticky-btn, [onclick*="join"]').forEach(el => {
        const text = el.textContent.toLowerCase();
        if (text.includes('join') || text.includes('request')) {
          el.onclick = () => navigate('signup');
        }
      });
      // Animal emoji → levels
      wrapper.querySelectorAll('.grade-badge, .level-badge').forEach(el => {
        const text = el.textContent;
        if (['🐸','🦆','🦦','🐬','🦭'].some(a => text.includes(a))) {
          el.style.cursor = 'pointer';
          el.onclick = () => navigate('levels');
        }
      });
      break;

    case 'mytrips':
      // Past trip → post-trip (if pending)
      wrapper.querySelectorAll('[onclick*="posttrip"], .feedback-prompt').forEach(el => {
        el.onclick = () => navigate('posttrip');
      });
      break;

    case 'progress':
      // Witness avatars → member sheet (keep existing onclick)
      // Animal level chip → levels
      wrapper.querySelectorAll('.level-animal, .animal-chip').forEach(el => {
        el.style.cursor = 'pointer';

      break;

    case 'approval':

      break;

    case 'participants':
      // Already self-contained with internal navigation
      break;

    case 'profile':
      // ICE card is self-contained within profile

}

// ── Modal ──
function dismissModal() {
  document.getElementById('aspirantModal').style.display = 'none';
}
document.getElementById('aspirantModal').addEventListener('click', function(e) {
  if (e.target === this) dismissModal();
});

// Month name resets filter
document.querySelector('.month-name').addEventListener('click', function() {
  activeDisc = null;
  activeGrade = null;
  document.querySelectorAll('.disc-tab').forEach(c => c.classList.remove('active'));
  gradeChips.innerHTML = '';
  applyFilter();
});

const gradeConfig = {
  sea: [
    { grade: 'sea-a', label: 'Sea A', color: 'var(--sea-a)' },
    { grade: 'sea-b', label: 'Sea B', color: 'var(--sea-b)' },
    { grade: 'sea-c', label: 'Sea C', color: 'var(--sea-c)' }
  ],
  river: [
    { grade: 'riv-lo',  label: 'G1/2', color: 'var(--riv-lo)' },
    { grade: 'riv-mid', label: 'G3',   color: 'var(--riv-mid)' },
    { grade: 'riv-hi',  label: 'G4/5', color: 'var(--riv-hi)' }
  ],
  pool: [
    { grade: 'p1', label: 'P1', color: 'var(--p1)' },
    { grade: 'p2', label: 'P2', color: 'var(--p2)' },
    { grade: 'p3', label: 'P3', color: 'var(--p3)' }
  ]
};

let activeDisc = null;
let activeGrade = null;

const gradeChips = document.getElementById('gradeChips');
const resultsInline = document.getElementById('resultsInline');

// ── Discipline tabs ──
document.querySelectorAll('.disc-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    const disc = this.dataset.disc;

    if (activeDisc === disc) {
      activeDisc = null;
      activeGrade = null;
      this.classList.remove('active');
      gradeChips.innerHTML = '';
      applyFilter();
      return;
    }

    activeDisc = disc;
    activeGrade = null;
    document.querySelectorAll('.disc-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');

    // Build grade chips inline with month nav
    gradeChips.innerHTML = '';
    if (gradeConfig[disc]) {
      gradeConfig[disc].forEach(function(g) {
        const chip = document.createElement('div');
        chip.className = 'grade-chip';
        chip.dataset.grade = g.grade;
        chip.style.color = g.color;
        chip.innerHTML = \`<div class="gchip-pip" style="background:\${g.color}"></div>\${g.label}\`;
        chip.addEventListener('click', function(e) {
          e.stopPropagation();
          if (activeGrade === g.grade) {
            activeGrade = null;
            this.classList.remove('active');
          } else {
            activeGrade = g.grade;
            document.querySelectorAll('.grade-chip').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
          }
          applyFilter();
        });
        gradeChips.appendChild(chip);
      });
    }

    applyFilter();
  });
});

// ── Apply filter ──
function applyFilter() {
  const cards = document.querySelectorAll('.event-row, .event-feat');
  let visibleCount = 0;

  cards.forEach(function(card) {
    const disc = card.dataset.disc;
    const grade = card.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    card.style.display = show ? '' : 'none';
    if (show) visibleCount++;
  });

  document.querySelectorAll('.mev').forEach(function(pip) {
    const disc = pip.dataset.disc;
    const grade = pip.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    pip.classList.toggle('faded', !show);
  });

  if (activeDisc) {
    resultsInline.textContent = \`\${visibleCount} event\${visibleCount !== 1 ? 's' : ''}\`;
    resultsInline.classList.add('visible');
  } else {
    resultsInline.textContent = '';
    resultsInline.classList.remove('visible');
  }
}
<\/script>`;

function goStep(n) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));

  currentStep = n;
  updateProgress();
  updateNav();
  window.scrollTo(0, 0);
}

function nextStep() {
  if (currentStep < totalSteps) goStep(currentStep + 1);

function prevStep() {
  if (currentStep > 1) goStep(currentStep - 1);

function updateProgress() {
  document.querySelectorAll('.step').forEach((s, i) => {
    const n = i < 2 ? Math.floor(i/1)+1 : null;
    s.classList.remove('active','done');
  });

  // Re-index steps (skipping step-lines)
  const steps = document.querySelectorAll('.step');
  const lines = document.querySelectorAll('.step-line');

  steps.forEach((s, i) => {
    const stepNum = i + 1;
    s.classList.remove('active','done');
    const circle = s.querySelector('.step-circle');
    if (stepNum < currentStep) {
      s.classList.add('done');
      circle.textContent = '✓';
    } else if (stepNum === currentStep) {
      s.classList.add('active');
      circle.textContent = stepNum;
    } else {
      circle.textContent = stepNum;
    }
  });

  lines.forEach((l, i) => {
    l.classList.toggle('done', i + 1 < currentStep);
  });
}

function updateNav() {
  const nextBtn = document.getElementById('nextBtn');
  if (currentStep === totalSteps) {
    nextBtn.textContent = 'Publish Event';
    nextBtn.className = 'btn-publish';

}

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
}

function showCancel(tripName, refund, paid) {
  document.getElementById('sheetTitle').textContent = tripName;
  document.getElementById('sheetRefund').innerHTML =
    \`You'll receive a <strong>\${refund} refund</strong> (50% of \${paid}).\`;
  document.getElementById('cancelSheet').classList.add('visible');
}

function hideCancel(e) {
  if (!e || e.target === document.getElementById('cancelSheet')) {
    document.getElementById('cancelSheet').classList.remove('visible');
  }
}

function confirmCancel() {
  document.getElementById('cancelSheet').classList.remove('visible');
  // In the real app: Stripe refund, notify leader, promote waitlist
  alert('Your place has been cancelled and your refund is on its way.');
}
<\/script>`;

<script>
function scrollTo(id) {
  // Update active nav chip
  document.querySelectorAll('.lnav-chip').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // Scroll to level card
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Highlight nav chip as user scrolls
const cards = ['frog','duck','otter','dolphin','selkie'];
const chips = document.querySelectorAll('.lnav-chip');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      const idx = cards.indexOf(id);
      if (idx >= 0) {
        chips.forEach(c => c.classList.remove('active'));
        chips[idx].classList.add('active');
      }
    }
  });
}, { threshold: 0.3 });

cards.forEach(id => {
  const el = document.getElementById(id);
  if (el) observer.observe(el);
});
<\/script>`;

    scoreReason: '5 Grade C trips ✓ · 5 years membership ✓ · Otter level ✓ — but you set this event to manual review for all.'
  }
];

let currentMember = 0;
let pendingAction = null;

function showMember(idx) {
  currentMember = idx;
  const m = members[idx];

  // Update queue highlight
  document.querySelectorAll('.queue-member').forEach((q, i) => {
    q.classList.toggle('active', i === idx);
  });

  // Update card header
  document.getElementById('cardAv').textContent = m.av;
  document.getElementById('cardName').textContent = m.name;
  document.getElementById('cardTenure').textContent = m.tenure;

  // Update level (simplified - just name)
  document.querySelector('.card-level-badge').textContent = m.level.split(' ')[0];
  document.querySelector('.card-level-name').textContent = m.level.split(' ').slice(1).join(' ');

  // Update score banner
  const banner = document.getElementById('scoreBanner');
  banner.className = 'score-banner ' + m.score;
  document.getElementById('scoreTitle').textContent = m.scoreTitle;
  document.getElementById('scoreReason').textContent = m.scoreReason;

  const icon = banner.querySelector('.score-icon');
  icon.textContent = m.score === 'review' ? '⚠️' : m.score === 'assess' ? '🚫' : '✅';

  // Reset to record tab
  switchCardTab('record', document.querySelector('.card-tab'));

  // Scroll to top
  window.scrollTo(0, 0);
}

function switchCardTab(name, el) {
  document.querySelectorAll('.card-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.card-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function showAsk() {
  document.getElementById('askSheet').classList.add('visible');
}

function showConfirm(action) {
  pendingAction = action;
  const m = members[currentMember];
  const title = document.getElementById('confirmTitle');
  const sub = document.getElementById('confirmSub');
  const btns = document.getElementById('confirmBtns');

  if (action === 'approve') {
    title.textContent = \`Approve \${m.name.split(' ')[0]}?\`;
    sub.textContent = \`Their card will be charged £12 and they'll be added to the trip. You can still remove them later if needed.\`;
    btns.innerHTML = \`
      <div class="confirm-yes-approve" onclick="finalDecision('approved')">Yes, approve</div>
      <div class="confirm-cancel" onclick="closeSheet(null, 'confirmSheet')">Cancel</div>
    \`;
  } else {
    title.textContent = \`Decline \${m.name.split(' ')[0]}?\`;
    sub.textContent = \`Their card authorisation will be released and they won't be charged. You can include a message below.\`;
    btns.innerHTML = \`
      <div class="confirm-yes-decline" onclick="finalDecision('declined')">Yes, decline</div>
      <div class="confirm-cancel" onclick="closeSheet(null, 'confirmSheet')">Cancel</div>
    \`;
  }

  document.getElementById('confirmSheet').classList.add('visible');
}

function sendQuestion() {
  closeSheet(null, 'askSheet');
  alert('Question sent to Duncan. You\\'ll be notified when they reply.');
}

function finalDecision(outcome) {
  closeSheet(null, 'confirmSheet');
  const name = members[currentMember].name.split(' ')[0];
  alert(\`\${name} has been \${outcome}. \${outcome === 'approved' ? 'Payment captured and they\\'ve been notified.' : 'Authorisation released and they\\'ve been notified.'}\`);
}

function closeSheet(e, id) {
  if (!e || e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('visible');
  }
}
<\/script>`;

document.querySelectorAll('.disc-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    const disc = this.dataset.disc;

    if (activeDisc === disc) {
      activeDisc = null;
      activeGrade = null;
      this.classList.remove('active');
      gradeChips.innerHTML = '';
      applyFilter();
      return;
    }

    activeDisc = disc;
    activeGrade = null;
    document.querySelectorAll('.disc-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');

    gradeChips.innerHTML = '';

        chip.style.color = g.color;
        chip.innerHTML = `<div class="gchip-pip" style="background:${g.color}"></div>${g.label}`;
        chip.addEventListener('click', function(e) {
          e.stopPropagation();
          if (activeGrade === g.grade) {
            activeGrade = null;
            this.classList.remove('active');
          } else {
            activeGrade = g.grade;
            document.querySelectorAll('.grade-chip').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
          }
          applyFilter();
        });
        gradeChips.appendChild(chip);
      });
    }

    applyFilter();
  });
});

// ── Apply filter ──
function applyFilter() {
  const cards = document.querySelectorAll('.event-row, .event-feat');
  let visibleCount = 0;

  cards.forEach(function(card) {
    const disc = card.dataset.disc;
    const grade = card.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    card.style.display = show ? '' : 'none';
    if (show) visibleCount++;
  });

  document.querySelectorAll('.mev').forEach(function(pip) {
    const disc = pip.dataset.disc;
    const grade = pip.dataset.grade;
    let show = true;
    if (activeDisc && disc !== activeDisc) show = false;
    if (show && activeGrade && grade !== activeGrade) show = false;
    pip.classList.toggle('faded', !show);
  });

  if (activeDisc) {
    resultsInline.textContent = `${visibleCount} event${visibleCount !== 1 ? 's' : ''}`;
    resultsInline.classList.add('visible');
  } else {
    resultsInline.textContent = '';
    resultsInline.classList.remove('visible');
  }
}
  } catch(e) { console.warn('Init calendar:', e); }
};

function updateProgress() {
  document.querySelectorAll('.step').forEach((s, i) => {
    const n = i < 2 ? Math.floor(i/1)+1 : null;

  // Re-index steps (skipping step-lines)

  steps.forEach((s, i) => {
    const stepNum = i + 1;
    s.classList.remove('active','done');
    const circle = s.querySelector('.step-circle');
    if (stepNum < currentStep) {

    } else if (stepNum === currentStep) {
      s.classList.add('active');
      circle.textContent = stepNum;
    } else {

  lines.forEach((l, i) => {
    l.classList.toggle('done', i + 1 < currentStep);

    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Highlight nav chip as user scrolls
const cards = ['frog','duck','otter','dolphin','selkie'];
const chips = document.querySelectorAll('.lnav-chip');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      const idx = cards.indexOf(id);
      if (idx >= 0) {
        chips.forEach(c => c.classList.remove('active'));
        chips[idx].classList.add('active');
      }
    }
  });
}, { threshold: 0.3 });

cards.forEach(id => {
  const el = document.getElementById(id);
  if (el) observer.observe(el);
});
  } catch(e) { console.warn('Init levels:', e); }
};

function switchCardTab(name, el) {
  document.querySelectorAll('.card-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.card-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function showAsk() {
  document.getElementById('askSheet').classList.add('visible');
}

function showConfirm(action) {
  pendingAction = action;
  const m = members[currentMember];
  const title = document.getElementById('confirmTitle');
  const sub = document.getElementById('confirmSub');
  const btns = document.getElementById('confirmBtns');

  if (action === 'approve') {
    title.textContent = `Approve ${m.name.split(' ')[0]}?`;
    sub.textContent = `Their card will be charged £12 and they'll be added to the trip. You can still remove them later if needed.`;
    btns.innerHTML = `
      <div class="confirm-yes-approve" onclick="finalDecision('approved')">Yes, approve</div>
      <div class="confirm-cancel" onclick="closeSheet(null, 'confirmSheet')">Cancel</div>
    `;
  } else {
    title.textContent = `Decline ${m.name.split(' ')[0]}?`;
    sub.textContent = `Their card authorisation will be released and they won't be charged. You can include a message below.`;
    btns.innerHTML = `
      <div class="confirm-yes-decline" onclick="finalDecision('declined')">Yes, decline</div>
      <div class="confirm-cancel" onclick="closeSheet(null, 'confirmSheet')">Cancel</div>
    `;
  }

  document.getElementById('confirmSheet').classList.add('visible');
}

function sendQuestion() {
  closeSheet(null, 'askSheet');
  alert('Question sent to Duncan. You\'ll be notified when they reply.');
}

function finalDecision(outcome) {
  closeSheet(null, 'confirmSheet');
  const name = members[currentMember].name.split(' ')[0];
  alert(`${name} has been ${outcome}. ${outcome === 'approved' ? 'Payment captured and they\'ve been notified.' : 'Authorisation released and they\'ve been notified.'}`);
}

function closeSheet(e, id) {
  if (!e || e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('visible');
  }
}
  } catch(e) { console.warn('Init approval:', e); }
};
