<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OtterPool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet">
<style>
  :root {
    --peat:        #141a14;
    --snow:        #f4f5f2;
    --white:       #ffffff;
    --border:      rgba(80,100,80,0.13);
    --stone:       #7a8a78;
    --stone-lt:    #aab8a8;
    --forest:      #2c4a2e;
    --forest-mid:  #3d6640;
    --forest-lt:   #5a8c5e;
    --forest-pale: #e4ede4;
    --topbar:      #2a4560;
    --amber:       #c4622d;
    --amber-pale:  #f5e0d6;
    --sea-a:       #00c8b4;
    --sea-b:       #0098a0;
    --sea-c:       #005a6e;
    --riv-lo:      #58d048;
    --riv-mid:     #28a030;
    --riv-hi:      #0a5018;
    --p1:          #d4703a;
    --p2:          #b85530;
    --p3:          #8a2e10;
    --loch:        #5a7080;
    --red:         #8a1a1a;
    --red-pale:    #fde8e8;
    --green:       #1a5a1a;
    --green-pale:  #e0f0e0;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--snow);
    font-family: 'Source Serif 4', serif;
    color: var(--peat);
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* ── APP SHELL ── */
  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Screen container - scrollable content area */
  #screen-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4.5rem; /* space for bottom nav */
    position: relative;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 0.45rem 0 0.85rem;
    z-index: 200;
    box-shadow: 0 -1px 12px rgba(20,26,20,0.06);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.18rem;
    cursor: pointer;
    padding: 0.3rem 0;
    transition: opacity 0.1s;
  }

  .nav-item:active { opacity: 0.7; }

  .nav-icon { font-size: 1.3rem; line-height: 1; }

  .nav-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.58rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--stone-lt);
    transition: color 0.15s;
  }

  .nav-item.active .nav-label { color: var(--forest-mid); }
  .nav-item.active .nav-icon { filter: none; }

  /* ── SCREEN TRANSITIONS ── */
  .screen-wrap {
    min-height: 100%;
    animation: slideIn 0.22s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .screen-wrap.slide-back {
    animation: slideInBack 0.22s ease-out;
  }

  @keyframes slideInBack {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── LOADING STATE ── */
  .loading-spinner {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    flex-direction: column;
    gap: 0.875rem;
  }

  .spinner-icon {
    font-size: 2rem;
    animation: bob 1.2s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  .spinner-text {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--stone-lt);
    font-style: italic;
  }

  /* ── SCREEN DIRECTORY (for demo) ── */
  .screen-directory {
    padding: 0;
  }

  /* Home topbar */
  .home-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    height: 52px;
    background: var(--topbar);
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-size: 1.35rem;
    font-weight: 500;
    color: var(--snow);
    letter-spacing: 0.04em;
  }

  .wordmark span { color: var(--sea-a); }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  /* Leader create button */
  .create-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    color: white;
    cursor: pointer;
    transition: background 0.15s;
  }
  .create-btn:active { background: rgba(255,255,255,0.25); }

  .topbar-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.2);
  }

  /* Section header */
  .dir-section {
    padding: 0.875rem 0.875rem 0.4rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone-lt);
  }

  /* Screen tile */
  .screen-tile {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin: 0 0.875rem 0.5rem;
    padding: 0.875rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.875rem;
    cursor: pointer;
    transition: background 0.12s;
  }

  .screen-tile:active { background: var(--forest-pale); }

  .tile-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .tile-info { flex: 1; }

  .tile-name {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--peat);
    margin-bottom: 0.15rem;
  }

  .tile-desc {
    font-family: 'Source Serif 4', serif;
    font-size: 0.72rem;
    color: var(--stone);
    font-style: italic;
    line-height: 1.4;
  }

  .tile-role {
    font-family: 'Source Serif 4', serif;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    padding: 0.12rem 0.4rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--stone);
    flex-shrink: 0;
  }

  .tile-role.leader {
    background: var(--topbar);
    color: white;
    border-color: var(--topbar);
  }

  .tile-chevron {
    color: var(--stone-lt);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* Role toggle */
  .role-toggle {
    margin: 0 0.875rem 0.5rem;
    padding: 0.6rem 0.875rem;
    background: var(--forest-pale);
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .role-toggle-label {
    font-family: 'Source Serif 4', serif;
    font-size: 0.75rem;
    color: var(--forest);
  }

  .role-toggle-btns {
    display: flex;
    gap: 0.3rem;
  }

  .role-btn {
    padding: 0.25rem 0.65rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-family: 'Source Serif 4', serif;
    font-size: 0.65rem;
    color: var(--stone);
    cursor: pointer;
    background: var(--white);
    transition: all 0.12s;
  }

  .role-btn.active {
    background: var(--topbar);
    border-color: var(--topbar);
    color: white;
  }

  /* Bottom padding */
  .dir-bottom { height: 1rem; }

</style>
</head>
<body>

<div id="app">
  <div id="screen-container">
    <!-- Screens load here -->
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item active" id="nav-calendar" onclick="navigate('calendar')">
      <div class="nav-icon">📅</div>
      <div class="nav-label">Calendar</div>
    </div>
    <div class="nav-item" id="nav-mytrips" onclick="navigate('mytrips')">
      <div class="nav-icon">🚣</div>
      <div class="nav-label">My Trips</div>
    </div>
    <div class="nav-item" id="nav-progress" onclick="navigate('progress')">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Progress</div>
    </div>
    <div class="nav-item" id="nav-profile" onclick="navigate('profile')">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profile</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// OTTERPOOL ROUTER
// ══════════════════════════════════════════════

// Current state
let currentScreen = 'home';
let isLeader = false;
let navHistory = [];

// Screen definitions
const screens = {
  home:         { label: 'OtterPool',          nav: null       },
  calendar:     { label: 'Calendar',            nav: 'calendar' },
  event:        { label: 'Event',               nav: null       },
  create:       { label: 'Create Event',        nav: null       },
  mytrips:      { label: 'My Trips',            nav: 'mytrips'  },
  progress:     { label: 'Progress',            nav: 'progress' },
  levels:       { label: 'Levels',              nav: null       },
  approval:     { label: 'Approvals',           nav: null       },
  participants: { label: 'Participants',        nav: null       },
  posttrip:     { label: 'Post-trip',           nav: null       },
  profile:      { label: 'Profile',             nav: 'profile'  },
  signup:       { label: 'Request to Join',     nav: null       },
};

// Screen HTML files
const screenFiles = {
  calendar:     'otter-pool-calendar-v7.html',
  event:        'otter-pool-event.html',
  create:       'otter-pool-create-event.html',
  mytrips:      'otter-pool-my-trips.html',
  progress:     'otter-pool-progress.html',
  levels:       'otter-pool-levels.html',
  approval:     'otter-pool-approval.html',
  participants: 'otter-pool-participants.html',
  posttrip:     'otter-pool-posttrip.html',
  profile:      'otter-pool-profile.html',
  signup:       'otter-pool-signup.html',
};

// Cache loaded screens
const screenCache = {};

// ── NAVIGATION ──────────────────────────────

function navigate(screenId, options = {}) {
  const { back = false, params = {} } = options;

  // Update nav history
  if (!back) {
    navHistory.push(currentScreen);
  }

  currentScreen = screenId;

  // Update bottom nav active state
  updateBottomNav(screenId);

  // Load the screen
  if (screenId === 'home') {
    renderHome();
  } else {
    loadScreen(screenId, back);
  }

  // Scroll to top
  document.getElementById('screen-container').scrollTo(0, 0);
}

function goBack() {
  if (navHistory.length > 0) {
    const prev = navHistory.pop();
    navigate(prev, { back: true });
  } else {
    navigate('calendar', { back: true });
  }
}

function updateBottomNav(screenId) {
  // Find which nav tab this screen belongs to
  const navId = screens[screenId]?.nav;

  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });

  if (navId) {
    const navEl = document.getElementById('nav-' + navId);
    if (navEl) navEl.classList.add('active');
  }

  // Hide bottom nav for full-screen flows
  const hideNav = ['signup', 'create', 'posttrip'].includes(screenId);
  document.getElementById('bottomNav').style.display = hideNav ? 'none' : 'flex';
}

// ── SCREEN LOADER ────────────────────────────

async function loadScreen(screenId, back = false) {
  const container = document.getElementById('screen-container');

  // Show spinner
  container.innerHTML = `
    <div class="loading-spinner">
      <div class="spinner-icon">🌊</div>
      <div class="spinner-text">Loading…</div>
    </div>
  `;

  try {
    let html;

    // Use cache if available
    if (screenCache[screenId]) {
      html = screenCache[screenId];
    } else {
      const filename = screenFiles[screenId];
      const response = await fetch(filename);
      const fullHtml = await response.text();

      // Extract body content
      const parser = new DOMParser();
      const doc = parser.parseFromString(fullHtml, 'text/html');

      // Get body content
      html = doc.body.innerHTML;

      // Extract and inject styles if not already done
      injectStyles(screenId, doc);

      // Cache it
      screenCache[screenId] = html;
    }

    // Inject into container with transition
    const wrapper = document.createElement('div');
    wrapper.className = 'screen-wrap' + (back ? ' slide-back' : '');
    wrapper.innerHTML = html;

    container.innerHTML = '';
    container.appendChild(wrapper);

    // Wire up navigation within the loaded screen
    wireNavigation(wrapper, screenId);

    // Re-run any inline scripts
    runScripts(wrapper);

  } catch (err) {
    container.innerHTML = `
      <div class="loading-spinner">
        <div class="spinner-icon">🦦</div>
        <div class="spinner-text">Couldn't load screen.<br>Make sure all files are in the same folder.</div>
      </div>
    `;
    console.error('Screen load error:', err);
  }
}

// ── STYLE INJECTOR ───────────────────────────

const injectedStyles = new Set();

function injectStyles(screenId, doc) {
  if (injectedStyles.has(screenId)) return;

  doc.querySelectorAll('style').forEach(styleEl => {
    // Skip :root blocks (already defined in shell)
    let css = styleEl.textContent.replace(/:root\s*\{[^}]+\}/g, '');
    if (css.trim()) {
      const newStyle = document.createElement('style');
      newStyle.textContent = css;
      newStyle.dataset.screen = screenId;
      document.head.appendChild(newStyle);
    }
  });

  injectedStyles.add(screenId);
}

// ── SCRIPT RUNNER ────────────────────────────

function runScripts(wrapper) {
  wrapper.querySelectorAll('script').forEach(oldScript => {
    const newScript = document.createElement('script');
    newScript.textContent = oldScript.textContent;
    document.body.appendChild(newScript);
    document.body.removeChild(newScript);
  });
}

// ── NAVIGATION WIRING ────────────────────────

function wireNavigation(wrapper, screenId) {
  // Wire back buttons
  wrapper.querySelectorAll('.topbar-back, [data-back]').forEach(el => {
    el.onclick = () => goBack();
  });

  // Screen-specific wiring
  switch (screenId) {

    case 'calendar':
      // Event cards → event detail
      wrapper.querySelectorAll('.event-card, .event-row, [onclick*="event"]').forEach(el => {
        const orig = el.getAttribute('onclick');
        if (!orig || orig.includes('navigate')) return;
        el.onclick = () => navigate('event');
      });
      // Create event button (leader)
      const createBtn = wrapper.querySelector('.create-btn, [onclick*="create"]');
      if (createBtn) createBtn.onclick = () => navigate('create');
      break;

    case 'event':
      // Participants → participant list
      wrapper.querySelectorAll('.participants-row, .participant-avatars, [onclick*="participant"]').forEach(el => {
        el.onclick = () => navigate('participants');
      });
      // Request to join → signup
      wrapper.querySelectorAll('.join-btn, .sticky-btn, [onclick*="join"]').forEach(el => {
        const text = el.textContent.toLowerCase();
        if (text.includes('join') || text.includes('request')) {
          el.onclick = () => navigate('signup');
        }
      });
      // Animal emoji → levels
      wrapper.querySelectorAll('.grade-badge, .level-badge').forEach(el => {
        const text = el.textContent;
        if (['🐸','🦆','🦦','🐬','🦭'].some(a => text.includes(a))) {
          el.style.cursor = 'pointer';
          el.onclick = () => navigate('levels');
        }
      });
      break;

    case 'mytrips':
      // Past trip → post-trip (if pending)
      wrapper.querySelectorAll('[onclick*="posttrip"], .feedback-prompt').forEach(el => {
        el.onclick = () => navigate('posttrip');
      });
      break;

    case 'progress':
      // Witness avatars → member sheet (keep existing onclick)
      // Animal level chip → levels
      wrapper.querySelectorAll('.level-animal, .animal-chip').forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = () => navigate('levels');
      });
      break;

    case 'approval':
      // Approval screen is self-contained, just wire back
      break;

    case 'participants':
      // Already self-contained with internal navigation
      break;

    case 'profile':
      // ICE card is self-contained within profile
      break;
  }
}

// ── HOME SCREEN ──────────────────────────────

function renderHome() {
  const container = document.getElementById('screen-container');

  container.innerHTML = `
    <div class="screen-wrap">
      <div class="home-topbar">
        <div class="wordmark">Otter<span>Pool</span></div>
        <div class="topbar-actions">
          ${isLeader ? '<div class="create-btn" onclick="navigate(\'create\')" title="Create event">＋</div>' : ''}
          <div class="topbar-avatar" onclick="navigate(\'profile\')">🦦</div>
        </div>
      </div>

      <div class="role-toggle">
        <div class="role-toggle-label">Viewing as:</div>
        <div class="role-toggle-btns">
          <div class="role-btn ${!isLeader ? 'active' : ''}" onclick="setRole(false)">Member</div>
          <div class="role-btn ${isLeader ? 'active' : ''}" onclick="setRole(true)">Selkie</div>
        </div>
      </div>

      <div class="dir-section">Member screens</div>

      <div class="screen-tile" onclick="navigate('calendar')">
        <div class="tile-icon" style="background:#e8f0f8;">📅</div>
        <div class="tile-info">
          <div class="tile-name">Calendar</div>
          <div class="tile-desc">Browse and filter upcoming events by discipline and grade</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('event')">
        <div class="tile-icon" style="background:#e4f0f4;">🌊</div>
        <div class="tile-info">
          <div class="tile-name">Event Detail</div>
          <div class="tile-desc">Kentallen — Castle Stalker · Sea C</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('signup')">
        <div class="tile-icon" style="background:#e4ede4;">✍️</div>
        <div class="tile-info">
          <div class="tile-name">Sign-up / Assessment</div>
          <div class="tile-desc">Request to join an event — 7 question assessment flow</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('mytrips')">
        <div class="tile-icon" style="background:#e4ede4;">🚣</div>
        <div class="tile-info">
          <div class="tile-name">My Trips</div>
          <div class="tile-desc">Upcoming confirmed trips and past trip log</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('progress')">
        <div class="tile-icon" style="background:#e4ede4;">📊</div>
        <div class="tile-info">
          <div class="tile-name">Progress</div>
          <div class="tile-desc">Level, experience tallies, corroboration record</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('levels')">
        <div class="tile-icon" style="background:#e4ede4;">🦦</div>
        <div class="tile-info">
          <div class="tile-name">Levels Reference</div>
          <div class="tile-desc">Full descriptions, craft control and rescue benchmarks</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('profile')">
        <div class="tile-icon" style="background:#e4ede4;">👤</div>
        <div class="tile-info">
          <div class="tile-name">Profile &amp; ICE Card</div>
          <div class="tile-desc">Personal details and emergency information</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('posttrip')">
        <div class="tile-icon" style="background:#e4ede4;">📝</div>
        <div class="tile-info">
          <div class="tile-name">Post-trip Feedback</div>
          <div class="tile-desc">Member response, leader feedback and attendance</div>
        </div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="dir-section">Leader / Selkie screens</div>

      <div class="screen-tile" onclick="navigate('create')">
        <div class="tile-icon" style="background:#e8f0f8;">＋</div>
        <div class="tile-info">
          <div class="tile-name">Create Event</div>
          <div class="tile-desc">6-step event creation flow</div>
        </div>
        <div class="tile-role leader">Selkie</div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('approval')">
        <div class="tile-icon" style="background:#e8f0f8;">✅</div>
        <div class="tile-info">
          <div class="tile-name">Approve Requests</div>
          <div class="tile-desc">Member record, assessment answers, summary tab</div>
        </div>
        <div class="tile-role leader">Selkie</div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="screen-tile" onclick="navigate('participants')">
        <div class="tile-icon" style="background:#e8f0f8;">👥</div>
        <div class="tile-info">
          <div class="tile-name">Participant List &amp; ICE</div>
          <div class="tile-desc">Confirmed attendees, member profiles, ICE data</div>
        </div>
        <div class="tile-role leader">Selkie</div>
        <div class="tile-chevron">›</div>
      </div>

      <div class="dir-bottom"></div>
    </div>
  `;
}

function setRole(leader) {
  isLeader = leader;
  renderHome();
}

// ── INIT ─────────────────────────────────────

// Start on home screen
renderHome();

// Handle browser back button
window.addEventListener('popstate', () => {
